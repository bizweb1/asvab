&lt;html lang=&quot;en&quot;&gt;

&lt;title&gt;ASVAB General Science — Field Manual&lt;/title&gt;

&lt;style&gt;
:root{
  --od:#3a3f2a;        /* olive drab */
  --od-deep:#23271a;   /* deep field green */
  --od-dark:#181b12;   /* near black green */
  --sand:#d8cdb0;      /* canvas / sand */
  --sand-2:#c4b894;
  --amber:#e8a02a;     /* signal amber */
  --amber-soft:#f0c468;
  --rust:#a8431f;      /* alert / wrong */
  --green:#6f8f3a;     /* correct */
  --paper:#e9e2cd;     /* manual page */
  --paper-2:#ded5bb;
  --ink:#22241a;
  --line:rgba(34,36,26,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:&#x27;Roboto&#x27;,sans-serif;
  background:var(--od-dark);
  color:var(--ink);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--amber);color:var(--od-dark)}

/* ---------- TOP CLASSIFICATION BAR ---------- */
.classbar{
  background:repeating-linear-gradient(45deg,var(--od-deep) 0 14px,#2b2f1f 14px 28px);
  color:var(--sand);
  font-family:&#x27;Roboto Mono&#x27;,monospace;
  font-size:.62rem;letter-spacing:.32em;font-weight:700;
  text-transform:uppercase;
  padding:7px 16px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid #000;
}
.classbar span{opacity:.85}

.seclink{background:var(--od-dark);display:flex;gap:0;border-bottom:1px solid rgba(216,205,176,.14)}
.seclink a{flex:1;text-align:center;text-decoration:none;padding:11px 8px;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--sand-2);border-right:1px solid rgba(216,205,176,.14);transition:all .15s}
.seclink a:last-child{border-right:none}
.seclink a:hover{color:var(--paper);background:var(--od-deep)}
.seclink a.here{color:var(--amber);font-weight:700;box-shadow:inset 0 -3px 0 var(--amber)}

/* ---------- HERO ---------- */
.hero{
  position:relative;
  background:
    linear-gradient(180deg,rgba(24,27,18,.72),rgba(24,27,18,.92)),
    radial-gradient(circle at 22% 18%,rgba(232,160,42,.13),transparent 45%),
    var(--od-deep);
  color:var(--sand);
  padding:54px 22px 60px;
  overflow:hidden;
  border-bottom:3px solid var(--amber);
}
.hero::before{
  content:&quot;&quot;;position:absolute;inset:0;
  background-image:linear-gradient(rgba(216,205,176,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(216,205,176,.04) 1px,transparent 1px);
  background-size:38px 38px;pointer-events:none;
}
.hero-inner{max-width:1080px;margin:0 auto;position:relative}
.eyebrow{
  font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.7rem;letter-spacing:.34em;
  color:var(--amber);text-transform:uppercase;font-weight:700;
  display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;
}
.eyebrow::after{content:&quot;&quot;;height:1px;flex:1;min-width:30px;background:linear-gradient(90deg,var(--amber),transparent)}
.hero h1{
  font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;
  font-size:clamp(2.5rem,8vw,5.4rem);line-height:.92;
  text-transform:uppercase;letter-spacing:.01em;color:var(--paper);
  text-shadow:3px 3px 0 rgba(0,0,0,.35);
}
.hero h1 .accent{
  display:block;color:var(--amber);
  font-size:clamp(1.1rem,3.4vw,2rem);letter-spacing:.18em;margin-top:8px;font-weight:600;
}
.hero p.lede{
  max-width:560px;margin:22px 0 0;font-size:1.06rem;color:var(--sand-2);
  font-family:&#x27;Roboto Condensed&#x27;,sans-serif;
}
.specrow{
  display:flex;gap:0;flex-wrap:wrap;margin-top:34px;
  border:1px solid rgba(216,205,176,.28);
  background:rgba(0,0,0,.22);
}
.spec{
  flex:1;min-width:120px;padding:14px 18px;
  border-right:1px solid rgba(216,205,176,.2);
}
.spec:last-child{border-right:none}
.spec .k{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.6rem;letter-spacing:.22em;color:var(--amber);text-transform:uppercase}
.spec .v{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:1.5rem;font-weight:600;color:var(--paper);margin-top:3px}
.spec .v small{font-size:.7rem;color:var(--sand-2);font-family:&#x27;Roboto Mono&#x27;,monospace;display:block;letter-spacing:.12em;font-weight:400}

/* ---------- NAV / VIEW SWITCH ---------- */
.viewnav{
  position:sticky;top:0;z-index:40;
  background:var(--od-dark);
  border-bottom:1px solid rgba(216,205,176,.18);
  display:flex;gap:0;overflow-x:auto;
}
.viewnav button{
  flex:0 0 auto;
  background:transparent;border:none;cursor:pointer;
  color:var(--sand-2);
  font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:500;font-size:.92rem;
  letter-spacing:.12em;text-transform:uppercase;
  padding:15px 22px;position:relative;white-space:nowrap;
  transition:color .15s;
}
.viewnav button:hover{color:var(--paper)}
.viewnav button.active{color:var(--amber)}
.viewnav button.active::after{
  content:&quot;&quot;;position:absolute;left:14px;right:14px;bottom:0;height:3px;background:var(--amber);
}
.viewnav .count{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;opacity:.6;margin-left:6px}

/* ---------- WRAP ---------- */
.wrap{max-width:1080px;margin:0 auto;padding:38px 22px 80px}
.view{display:none}
.view.active{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.sechead{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.sechead h2{
  font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;text-transform:uppercase;
  font-size:1.7rem;letter-spacing:.04em;color:var(--paper);
}
.sechead .tag{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;letter-spacing:.2em;color:var(--amber);text-transform:uppercase}
.secsub{color:var(--sand-2);font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1rem;margin-bottom:26px;max-width:640px}

/* ---------- FILTER CHIPS ---------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.chip{
  font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;
  padding:7px 13px;border:1px solid rgba(216,205,176,.3);background:transparent;color:var(--sand-2);
  cursor:pointer;transition:all .15s;border-radius:1px;
}
.chip:hover{border-color:var(--amber);color:var(--paper)}
.chip.active{background:var(--amber);color:var(--od-dark);border-color:var(--amber);font-weight:700}

/* ---------- ROSTER GRID ---------- */
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-left:5px solid var(--cat,#888);
  padding:16px 16px 15px;cursor:pointer;position:relative;
  transition:transform .12s,box-shadow .12s;
  display:flex;flex-direction:column;min-height:138px;
}
.card:hover{transform:translateY(-3px);box-shadow:6px 8px 0 rgba(0,0,0,.32)}
.card .cardtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.card .lnum{
  font-family:&#x27;Roboto Mono&#x27;,monospace;font-weight:700;font-size:.66rem;letter-spacing:.14em;
  color:#6a6750;
}
.card .catpill{
  font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 7px;color:#fff;background:var(--cat,#888);font-weight:700;border-radius:1px;
}
.card h3{
  font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:600;font-size:1.12rem;line-height:1.12;
  color:var(--ink);margin-bottom:8px;text-transform:uppercase;letter-spacing:.01em;
}
.card .ans{
  margin-top:auto;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.82rem;color:#55523f;
  display:flex;align-items:center;gap:6px;
}
.card .ans b{color:var(--rust);font-weight:700}
.card .go{
  position:absolute;right:13px;bottom:12px;font-family:&#x27;Roboto Mono&#x27;,monospace;
  font-size:.7rem;color:var(--cat,#888);opacity:0;transition:opacity .15s;letter-spacing:.1em;
}
.card:hover .go{opacity:1}

/* ---------- LESSON DETAIL (MODAL) ---------- */
.scrim{
  position:fixed;inset:0;background:rgba(10,12,7,.82);z-index:90;
  display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto;
  backdrop-filter:blur(3px);
}
.scrim.open{display:flex}
.dossier{
  background:var(--paper);max-width:720px;width:100%;margin:auto;position:relative;
  border:1px solid #000;box-shadow:0 30px 80px rgba(0,0,0,.6);
  animation:pop .3s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(14px)}to{opacity:1;transform:none}}
.dossier-band{
  background:var(--od-deep);color:var(--sand);padding:14px 22px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:3px solid var(--amber);
}
.dossier-band .dnum{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.2em;color:var(--amber)}
.dossier-band .dcat{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;background:var(--cat,#888);color:#fff;font-weight:700}
.closeb{
  position:absolute;top:9px;right:12px;background:none;border:none;color:var(--sand);
  font-size:1.5rem;cursor:pointer;line-height:1;z-index:5;width:34px;height:34px;
}
.closeb:hover{color:var(--amber)}
.dossier-body{padding:24px 26px 30px}
.dossier-body h2{
  font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;text-transform:uppercase;
  font-size:1.7rem;line-height:1;color:var(--ink);margin-bottom:18px;letter-spacing:.01em;
}
.qbox{
  background:var(--paper-2);border:1px dashed #9a937a;padding:14px 16px;margin-bottom:6px;
}
.qbox .ql{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.58rem;letter-spacing:.2em;color:#7a755e;text-transform:uppercase;margin-bottom:5px}
.qbox .qt{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1.02rem;color:var(--ink);font-style:italic}
.answer-reveal{
  margin:14px 0 22px;border:1px solid var(--line);background:#fff;
}
.answer-reveal .rev-btn{
  width:100%;background:var(--od);color:var(--sand);border:none;cursor:pointer;
  font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  font-size:.82rem;padding:11px;transition:background .15s;
}
.answer-reveal .rev-btn:hover{background:var(--od-deep)}
.answer-reveal .rev-content{display:none;padding:14px 16px;text-align:center}
.answer-reveal.shown .rev-content{display:block}
.answer-reveal.shown .rev-btn{display:none}
.answer-reveal .rev-content .lbl{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.58rem;letter-spacing:.2em;color:#7a755e;text-transform:uppercase}
.answer-reveal .rev-content .val{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:1.7rem;font-weight:700;color:var(--green);text-transform:uppercase;margin-top:3px}

.block{margin-bottom:20px}
.block .bh{
  font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
  font-size:.92rem;color:var(--od);display:flex;align-items:center;gap:9px;margin-bottom:8px;
}
.block .bh::before{content:&quot;&quot;;width:18px;height:2px;background:var(--amber)}
.block p{font-size:.98rem;color:#33352a}
.memory{
  background:linear-gradient(180deg,#fbe9c4,#f5dca0);
  border:1px solid #d9b35e;border-left:5px solid var(--amber);
  padding:13px 16px;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;
}
.memory .mlbl{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.56rem;letter-spacing:.2em;color:#8a6a1c;text-transform:uppercase;margin-bottom:4px;font-weight:700}
.memory .mtxt{font-size:1.08rem;font-weight:700;color:#5e4710}
.reword-list{list-style:none}
.reword-list li{
  font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.95rem;color:#3a3c30;
  padding:6px 0 6px 22px;position:relative;border-bottom:1px dotted var(--line);
}
.reword-list li::before{content:&quot;▸&quot;;position:absolute;left:2px;color:var(--amber);font-size:.8rem;top:7px}
.mini{background:var(--od-deep);color:var(--sand);padding:16px 18px}
.mini .mh{font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.12em;font-size:.92rem;color:var(--amber);margin-bottom:9px}
.mini ol{margin-left:18px}
.mini li{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.96rem;margin-bottom:6px;color:var(--sand)}
.mini .note{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;color:#9a9577;margin-top:8px;letter-spacing:.06em}

.dossier-nav{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding:14px 26px;background:var(--paper-2)}
.dossier-nav button{
  background:none;border:1px solid var(--od);color:var(--od);cursor:pointer;
  font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;
  padding:8px 14px;transition:all .15s;
}
.dossier-nav button:hover:not(:disabled){background:var(--od);color:var(--sand)}
.dossier-nav button:disabled{opacity:.3;cursor:default}

/* ---------- FLASHCARDS ---------- */
.flash-stage{max-width:540px;margin:0 auto}
.flash-progress{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.7rem;letter-spacing:.18em;color:var(--sand-2);text-align:center;margin-bottom:14px}
.flash-progress b{color:var(--amber)}
.flashcard{
  perspective:1600px;height:340px;cursor:pointer;margin-bottom:20px;
}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.flashcard.flipped .flash-inner{transform:rotateY(180deg)}
.flash-face{
  position:absolute;inset:0;backface-visibility:hidden;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:30px;text-align:center;border:1px solid #000;
}
.flash-front{background:var(--paper);border-left:6px solid var(--cat,#888)}
.flash-front .fcat{position:absolute;top:14px;left:18px;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--cat,#888);padding:3px 9px;font-weight:700}
.flash-front .fnum{position:absolute;top:14px;right:18px;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;color:#7a755e;letter-spacing:.1em}
.flash-front .fq{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1.22rem;color:var(--ink);font-style:italic;line-height:1.35}
.flash-front .ftap{position:absolute;bottom:16px;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.58rem;letter-spacing:.18em;color:#9a937a;text-transform:uppercase}
.flash-back{background:var(--od-deep);color:var(--sand);transform:rotateY(180deg);border-left:6px solid var(--amber)}
.flash-back .balbl{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.58rem;letter-spacing:.22em;color:var(--amber);text-transform:uppercase;margin-bottom:6px}
.flash-back .baval{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:2rem;font-weight:700;color:var(--paper);text-transform:uppercase;line-height:1.05;margin-bottom:16px}
.flash-back .bmem{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1rem;color:var(--amber-soft);border-top:1px solid rgba(216,205,176,.25);padding-top:14px;max-width:90%}
.flash-controls{display:flex;gap:10px;justify-content:center}
.flash-controls button{
  background:var(--od);color:var(--sand);border:none;cursor:pointer;
  font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  font-size:.82rem;padding:11px 20px;transition:background .15s;
}
.flash-controls button:hover:not(:disabled){background:var(--amber);color:var(--od-dark)}
.flash-controls button:disabled{opacity:.3;cursor:default}

/* ---------- EXAM ---------- */
.exam-intro{background:var(--paper);border:1px solid var(--line);border-left:5px solid var(--amber);padding:20px 22px;margin-bottom:24px}
.exam-intro p{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;color:#33352a;font-size:1rem}
.exam-start{background:var(--amber);color:var(--od-dark);border:none;cursor:pointer;font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:.92rem;padding:13px 26px;margin-top:14px}
.exam-start:hover{background:var(--amber-soft)}
.qcard{
  background:var(--paper);border:1px solid var(--line);padding:18px 20px;margin-bottom:14px;
}
.qcard .qhead{display:flex;gap:10px;margin-bottom:13px}
.qcard .qn{font-family:&#x27;Roboto Mono&#x27;,monospace;font-weight:700;color:var(--amber);background:var(--od-deep);padding:2px 9px;font-size:.78rem;height:fit-content;letter-spacing:.05em}
.qcard .qtext{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1.05rem;color:var(--ink);font-weight:700;flex:1}
.opts{display:grid;gap:8px}
.opt{
  display:flex;align-items:center;gap:11px;padding:10px 14px;border:1px solid var(--line);
  background:#fff;cursor:pointer;transition:all .12s;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.98rem;
}
.opt:hover{border-color:var(--od);background:#fbf8ef}
.opt .ol{font-family:&#x27;Roboto Mono&#x27;,monospace;font-weight:700;font-size:.78rem;color:var(--od);width:18px;flex:0 0 auto}
.opt.selected{border-color:var(--od);background:#efe9d6;box-shadow:inset 3px 0 0 var(--od)}
.opt.correct{border-color:var(--green);background:#e7eed3;box-shadow:inset 3px 0 0 var(--green)}
.opt.wrong{border-color:var(--rust);background:#f1ddd2;box-shadow:inset 3px 0 0 var(--rust)}
.opt.correct .ol{color:var(--green)}
.opt.wrong .ol{color:var(--rust)}
.exam-submit{background:var(--green);color:#fff;border:none;cursor:pointer;font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:.92rem;padding:14px 30px;margin-top:8px;width:100%}
.exam-submit:hover{background:#5e7a31}
.exam-submit:disabled{opacity:.4;cursor:default}

.scorecard{
  background:var(--od-deep);color:var(--sand);border:3px solid var(--amber);padding:28px 24px;text-align:center;margin-bottom:26px;
  display:none;
}
.scorecard.show{display:block;animation:fade .4s}
.scorecard .stamp{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;letter-spacing:.26em;color:var(--amber);text-transform:uppercase}
.scorecard .big{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:4.2rem;font-weight:700;color:var(--paper);line-height:1}
.scorecard .big small{font-size:1.4rem;color:var(--sand-2)}
.scorecard .verdict{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:1.3rem;text-transform:uppercase;letter-spacing:.1em;margin-top:6px}
.scorecard .verdict.pass{color:var(--green)}
.scorecard .verdict.review{color:var(--amber)}
.scorecard .retake{background:none;border:1px solid var(--sand);color:var(--sand);cursor:pointer;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;padding:9px 18px;margin-top:16px}
.scorecard .retake:hover{background:var(--sand);color:var(--od-deep)}

/* ---------- FOOTER ---------- */
.foot{
  background:var(--od-dark);color:var(--sand-2);border-top:1px solid rgba(216,205,176,.15);
  padding:26px 22px;text-align:center;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.12em;
}
.foot b{color:var(--amber)}

  .spec:nth-child(even){border-right:none}
  .flashcard{height:300px}
  .dossier-body{padding:20px 18px 24px}
}

const DATA = {&quot;lessons&quot;: [{&quot;num&quot;: 1, &quot;title&quot;: &quot;Proteins: Growth, Maintenance, and Repair&quot;, &quot;question&quot;: &quot;_____ are necessary for the body’s maintenance, growth, and repair.&quot;, &quot;answer&quot;: &quot;Proteins&quot;, &quot;concept&quot;: &quot;Proteins are nutrients your body uses to build and repair tissue. Muscles, skin, hair, enzymes, hormones, and many body structures depend on protein. On ASVAB-style questions, words like growth, repair, tissue building, and maintenance point to protein.&quot;, &quot;memory&quot;: &quot;Protein = Repair. If the question says repair or growth, choose protein.&quot;, &quot;reword&quot;: [&quot;Which nutrient repairs body tissue?&quot;, &quot;What nutrient is needed for growth?&quot;], &quot;mini&quot;: [&quot;Which nutrient is most connected to muscle repair?&quot;, &quot;If a question says “main energy source,” would the answer still be protein?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 2, &quot;title&quot;: &quot;Boiling Point of Water in Fahrenheit&quot;, &quot;question&quot;: &quot;On a Fahrenheit thermometer, the boiling point of water at sea level is _____.&quot;, &quot;answer&quot;: &quot;212°F&quot;, &quot;concept&quot;: &quot;At sea level, pure water boils at 212°F or 100°C. Water freezes at 32°F or 0°C. ASVAB questions often test these basic temperature facts.&quot;, &quot;memory&quot;: &quot;32 freezes. 212 boils.&quot;, &quot;reword&quot;: [&quot;Water boils at what Fahrenheit temperature?&quot;, &quot;What temperature is 100°C in Fahrenheit for boiling water?&quot;], &quot;mini&quot;: [&quot;What is water’s boiling point in Celsius?&quot;, &quot;What happens to water at 32°F?&quot;], &quot;cat&quot;: &quot;Chemistry&quot;}, {&quot;num&quot;: 3, &quot;title&quot;: &quot;Cellular Respiration&quot;, &quot;question&quot;: &quot;The process by which the body’s cells use oxygen and glucose to produce energy is known as _____.&quot;, &quot;answer&quot;: &quot;Respiration&quot;, &quot;concept&quot;: &quot;Cellular respiration is how cells make usable energy. Cells take in glucose and oxygen, then release energy, carbon dioxide, and water. This is different from photosynthesis, where plants use sunlight to make glucose.&quot;, &quot;memory&quot;: &quot;People respire to release energy. Plants photosynthesize to make food.&quot;, &quot;reword&quot;: [&quot;What process releases energy from glucose?&quot;, &quot;Cells use oxygen and sugar to make energy. What is this called?&quot;], &quot;mini&quot;: [&quot;What two ingredients do cells use in respiration?&quot;, &quot;Which process is mostly associated with plants making food?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 4, &quot;title&quot;: &quot;Veins Carry Blood Back&quot;, &quot;question&quot;: &quot;_____ carry blood back to the heart from the capillaries.&quot;, &quot;answer&quot;: &quot;Veins&quot;, &quot;concept&quot;: &quot;Arteries carry blood away from the heart. Veins carry blood back to the heart. Capillaries are tiny vessels where oxygen, nutrients, and wastes are exchanged with body tissues.&quot;, &quot;memory&quot;: &quot;Arteries = Away. Veins = Visit the heart.&quot;, &quot;reword&quot;: [&quot;Which vessels return blood to the heart?&quot;, &quot;Blood travels from capillaries back to the heart through what?&quot;], &quot;mini&quot;: [&quot;Which vessels carry blood away from the heart?&quot;, &quot;What are capillaries mainly used for?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 5, &quot;title&quot;: &quot;Chemical vs Physical Change&quot;, &quot;question&quot;: &quot;Which of the following is an example of a chemical process?&quot;, &quot;answer&quot;: &quot;Iron forms rust&quot;, &quot;concept&quot;: &quot;A chemical change creates a new substance. Rust is a new substance that forms when iron reacts with oxygen. Physical changes change form or state but do not make a new substance.&quot;, &quot;memory&quot;: &quot;New substance = chemical change. Same substance = physical change.&quot;, &quot;reword&quot;: [&quot;Which change makes a new substance?&quot;, &quot;Rusting is an example of what kind of change?&quot;], &quot;mini&quot;: [&quot;Is burning wood chemical or physical?&quot;, &quot;Is freezing water chemical or physical?&quot;], &quot;cat&quot;: &quot;Chemistry&quot;}, {&quot;num&quot;: 6, &quot;title&quot;: &quot;Universal Donor Blood Type&quot;, &quot;question&quot;: &quot;A universal donor is a person with which blood type?&quot;, &quot;answer&quot;: &quot;O negative&quot;, &quot;concept&quot;: &quot;For red blood cell donation, O negative is known as the universal donor because it lacks A, B, and Rh markers that commonly trigger immune reactions. AB positive is often called the universal recipient.&quot;, &quot;memory&quot;: &quot;O negative gives out. AB positive receives all.&quot;, &quot;reword&quot;: [&quot;Which blood type can donate red blood cells to most people?&quot;, &quot;Universal donor blood type is what?&quot;], &quot;mini&quot;: [&quot;Which blood type is commonly called universal recipient?&quot;, &quot;What does the negative refer to?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 7, &quot;title&quot;: &quot;Blood Entering the Right Atrium&quot;, &quot;question&quot;: &quot;Blood enters the right atrium of the heart from the _____.&quot;, &quot;answer&quot;: &quot;Vena cava&quot;, &quot;concept&quot;: &quot;The right atrium receives oxygen-poor blood returning from the body. That blood enters through the superior and inferior vena cava. Then it moves to the right ventricle and goes to the lungs.&quot;, &quot;memory&quot;: &quot;Vena cava returns body blood to the right atrium.&quot;, &quot;reword&quot;: [&quot;What vessel brings blood to the right atrium?&quot;, &quot;Oxygen-poor blood returns to the heart through what vessel?&quot;], &quot;mini&quot;: [&quot;Which vessel leaves the left ventricle?&quot;, &quot;Do pulmonary veins go to the right atrium or left atrium?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 8, &quot;title&quot;: &quot;pH Scale: Acids and Bases&quot;, &quot;question&quot;: &quot;Which substance has the highest pH?&quot;, &quot;answer&quot;: &quot;Ammonia&quot;, &quot;concept&quot;: &quot;The pH scale measures how acidic or basic a substance is. Low pH means acidic. High pH means basic or alkaline. Battery acid is very acidic, water is neutral around 7, and ammonia is basic, so it has the highest pH in this list.&quot;, &quot;memory&quot;: &quot;High pH = base. Ammonia is a base.&quot;, &quot;reword&quot;: [&quot;Which is most basic?&quot;, &quot;Which has the highest pH?&quot;], &quot;mini&quot;: [&quot;Is battery acid high pH or low pH?&quot;, &quot;What pH is neutral water near?&quot;], &quot;cat&quot;: &quot;Chemistry&quot;}, {&quot;num&quot;: 9, &quot;title&quot;: &quot;Small Intestine and Enzymes&quot;, &quot;question&quot;: &quot;Which organ does the most work to break down food using enzymes?&quot;, &quot;answer&quot;: &quot;Small intestine&quot;, &quot;concept&quot;: &quot;Most chemical digestion happens in the small intestine. Enzymes from the pancreas and small intestine break down carbohydrates, proteins, and fats. The stomach starts protein digestion, but the small intestine does most absorption and much of the enzyme work.&quot;, &quot;memory&quot;: &quot;Small intestine = big job in digestion.&quot;, &quot;reword&quot;: [&quot;Where does most chemical digestion occur?&quot;, &quot;Where do enzymes do most food breakdown?&quot;], &quot;mini&quot;: [&quot;Which organ produces many digestive enzymes?&quot;, &quot;Which intestine absorbs most nutrients?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 10, &quot;title&quot;: &quot;Female Reproductive System&quot;, &quot;question&quot;: &quot;Which of the following is NOT part of the female reproductive system?&quot;, &quot;answer&quot;: &quot;Testes&quot;, &quot;concept&quot;: &quot;Ovaries, uterus, and oviducts/fallopian tubes are parts of the female reproductive system. Testes are male reproductive organs that produce sperm and testosterone.&quot;, &quot;memory&quot;: &quot;Testes = male. Ovary, uterus, oviduct = female.&quot;, &quot;reword&quot;: [&quot;Which organ belongs to the male reproductive system?&quot;, &quot;Which is not female: uterus, ovary, oviduct, testes?&quot;], &quot;mini&quot;: [&quot;What organ produces eggs?&quot;, &quot;What is another name for the oviduct?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 11, &quot;title&quot;: &quot;Gene: Basic Unit of Inheritance&quot;, &quot;question&quot;: &quot;The most basic unit of inheritance is known as a _____.&quot;, &quot;answer&quot;: &quot;Gene&quot;, &quot;concept&quot;: &quot;A gene is a section of DNA that carries instructions for a trait or protein. Chromosomes are larger structures made of DNA and many genes. Genotype is genetic makeup; phenotype is the visible trait.&quot;, &quot;memory&quot;: &quot;Genes give instructions. Chromosomes carry many genes.&quot;, &quot;reword&quot;: [&quot;What is the smallest unit of heredity?&quot;, &quot;What DNA segment controls a trait?&quot;], &quot;mini&quot;: [&quot;What is a visible trait called?&quot;, &quot;Which is larger: a gene or a chromosome?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 12, &quot;title&quot;: &quot;Sedimentary Rock: Shale&quot;, &quot;question&quot;: &quot;Which of the following is a sedimentary rock?&quot;, &quot;answer&quot;: &quot;Shale&quot;, &quot;concept&quot;: &quot;Sedimentary rocks form when sediments are compacted and cemented over time. Shale forms from clay and mud sediments. Granite and obsidian are igneous; marble and slate are metamorphic.&quot;, &quot;memory&quot;: &quot;Sediments settle and become sedimentary. Shale is sedimentary.&quot;, &quot;reword&quot;: [&quot;Which rock forms from compacted sediment?&quot;, &quot;Shale is what type of rock?&quot;], &quot;mini&quot;: [&quot;What rock type forms from magma?&quot;, &quot;What rock type forms from heat and pressure?&quot;], &quot;cat&quot;: &quot;Earth &amp; Space&quot;}, {&quot;num&quot;: 13, &quot;title&quot;: &quot;Producer = Autotroph&quot;, &quot;question&quot;: &quot;A producer is also known as a(n) _____.&quot;, &quot;answer&quot;: &quot;Autotroph&quot;, &quot;concept&quot;: &quot;A producer makes its own food, usually through photosynthesis. The science word for a producer is autotroph. Consumers are heterotrophs because they must eat other organisms.&quot;, &quot;memory&quot;: &quot;Auto = self. Autotroph = self-feeder.&quot;, &quot;reword&quot;: [&quot;What is another word for producer?&quot;, &quot;An organism that makes its own food is called what?&quot;], &quot;mini&quot;: [&quot;Are plants usually autotrophs or heterotrophs?&quot;, &quot;What is a consumer called?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 14, &quot;title&quot;: &quot;Vulture = Scavenger&quot;, &quot;question&quot;: &quot;A vulture would be considered a _____.&quot;, &quot;answer&quot;: &quot;Scavenger&quot;, &quot;concept&quot;: &quot;A scavenger eats dead animals. Vultures are classic scavengers because they feed on carrion. They are not producers because they do not make their own food, and they are not parasites because they do not live in or on a host.&quot;, &quot;memory&quot;: &quot;Vultures scavenge carrion.&quot;, &quot;reword&quot;: [&quot;What animal eats carrion?&quot;, &quot;What type of consumer is a vulture?&quot;], &quot;mini&quot;: [&quot;Is a mushroom more like a decomposer or scavenger?&quot;, &quot;What does a parasite need?&quot;], &quot;cat&quot;: &quot;Biology&quot;}, {&quot;num&quot;: 15, &quot;title&quot;: &quot;Obsidian = Igneous Rock&quot;, &quot;question&quot;: &quot;What type of rock is obsidian?&quot;, &quot;answer&quot;: &quot;Igneous&quot;, &quot;concept&quot;: &quot;Obsidian is volcanic glass. It forms when lava cools very quickly, so it is an igneous rock. Igneous rocks form from molten material: magma underground or lava at the surface.&quot;, &quot;memory&quot;: &quot;Obsidian comes from lava, so it is igneous.&quot;, &quot;reword&quot;: [&quot;Volcanic glass is what rock type?&quot;, &quot;Obsidian forms from cooled lava, so it is what?&quot;], &quot;mini&quot;: [&quot;What rock type is formed by heat and pressure?&quot;, &quot;Is lava connected to igneous or sedimentary rocks?&quot;], &quot;cat&quot;: &quot;Earth &amp; Space&quot;}, {&quot;num&quot;: 16, &quot;title&quot;: &quot;Lunar Eclipse&quot;, &quot;question&quot;: &quot;During a lunar eclipse _____.&quot;, &quot;answer&quot;: &quot;The Earth lies between the Moon and Sun&quot;, &quot;concept&quot;: &quot;A lunar eclipse happens when Earth blocks sunlight from reaching the Moon. The order is Sun - Earth - Moon. The Moon moves into Earth’s shadow.&quot;, &quot;memory&quot;: &quot;Lunar = Moon gets dark because Earth is in the middle.&quot;, &quot;reword&quot;: [&quot;What is between the Sun and Moon during a lunar eclipse?&quot;, &quot;Whose shadow falls on the Moon?&quot;], &quot;mini&quot;: [&quot;What object is in the middle during a solar eclipse?&quot;, &quot;Whose shadow covers the Moon in a lunar eclipse?&quot;], &quot;cat&quot;: &quot;Earth &amp; Space&quot;}, {&quot;num&quot;: 17, &quot;title&quot;: &quot;Centimeter Meaning&quot;, &quot;question&quot;: &quot;A centimeter is _____.&quot;, &quot;answer&quot;: &quot;One hundredth of a meter&quot;, &quot;concept&quot;: &quot;The metric prefix centi- means one hundredth. Therefore, 1 centimeter is 1/100 of a meter. There are 100 centimeters in 1 meter.&quot;, &quot;memory&quot;: &quot;Century = 100 years. Centimeter = 1/100 meter.&quot;, &quot;reword&quot;: [&quot;What does centi- mean?&quot;, &quot;How much of a meter is a centimeter?&quot;], &quot;mini&quot;: [&quot;How many centimeters are in 1 meter?&quot;, &quot;What does milli- mean?&quot;] let curLesson=0;
function openDossier(num){
  curLesson=lessons.findIndex(l=&gt;l.num===num);
  paintDossier();
  document.getElementById(&#x27;scrim&#x27;).classList.add(&#x27;open&#x27;);
  document.body.style.overflow=&#x27;hidden&#x27;;
}
function paintDossier(){
  const l=lessons[curLesson];const col=CATCOLOR[l.cat];
  document.getElementById(&#x27;dossier&#x27;).style.setProperty(&#x27;--cat&#x27;,col);
  document.getElementById(&#x27;dNum&#x27;).textContent=&#x27;UNIT &#x27;+String(l.num).padStart(2,&#x27;0&#x27;)+&#x27; / 25&#x27;;
  document.getElementById(&#x27;dCat&#x27;).textContent=l.cat;
  document.getElementById(&#x27;dCat&#x27;).style.background=col;
  document.getElementById(&#x27;dBody&#x27;).innerHTML=`
    &lt;h2&gt;${l.title}&lt;/h2&gt;
    &lt;div class=&quot;qbox&quot;&gt;
      &lt;div class=&quot;ql&quot;&gt;Original Diagnostic Question&lt;/div&gt;
      &lt;div class=&quot;qt&quot;&gt;${l.question}&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;answer-reveal&quot; id=&quot;ansReveal&quot;&gt;
      &lt;button class=&quot;rev-btn&quot; onclick=&quot;document.getElementById(&#x27;ansReveal&#x27;).classList.add(&#x27;shown&#x27;)&quot;&gt;Reveal Answer ▾&lt;/button&gt;
      &lt;div class=&quot;rev-content&quot;&gt;&lt;div class=&quot;lbl&quot;&gt;Correct Answer&lt;/div&gt;&lt;div class=&quot;val&quot;&gt;${l.answer}&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;block&quot;&gt;&lt;div class=&quot;bh&quot;&gt;Concept Brief&lt;/div&gt;&lt;p&gt;${l.concept}&lt;/p&gt;&lt;/div&gt;
    &lt;div class=&quot;block memory&quot;&gt;&lt;div class=&quot;mlbl&quot;&gt;Memory Trick&lt;/div&gt;&lt;div class=&quot;mtxt&quot;&gt;${l.memory}&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;block&quot;&gt;&lt;div class=&quot;bh&quot;&gt;How the ASVAB May Reword It&lt;/div&gt;
      &lt;ul class=&quot;reword-list&quot;&gt;${l.reword.map(x=&gt;`&lt;li&gt;${x}&lt;/li&gt;`).join(&#x27;&#x27;)}&lt;/ul&gt;&lt;/div&gt;
    &lt;div class=&quot;block mini&quot;&gt;&lt;div class=&quot;mh&quot;&gt;Mini-Check&lt;/div&gt;
      &lt;ol&gt;${l.mini.map(x=&gt;`&lt;li&gt;${x}&lt;/li&gt;`).join(&#x27;&#x27;)}&lt;/ol&gt;
      &lt;div class=&quot;note&quot;&gt;// Write your answers before checking the brief.&lt;/div&gt;&lt;/div&gt;
  `;
  document.getElementById(&#x27;dPrev&#x27;).disabled=curLesson===0;
  document.getElementById(&#x27;dNext&#x27;).disabled=curLesson===lessons.length-1;
  document.querySelector(&#x27;.scrim&#x27;).scrollTop=0;
  document.getElementById(&#x27;dossier&#x27;).scrollIntoView({block:&#x27;start&#x27;});
}
function dossierNav(d){curLesson=Math.max(0,Math.min(lessons.length-1,curLesson+d));paintDossier();}
function closeDossier(){document.getElementById(&#x27;scrim&#x27;).classList.remove(&#x27;open&#x27;);document.body.style.overflow=&#x27;&#x27;;}
document.addEventListener(&#x27;keydown&#x27;,e=&gt;{
  if(!document.getElementById(&#x27;scrim&#x27;).classList.contains(&#x27;open&#x27;))return;
  if(e.key===&#x27;Escape&#x27;)closeDossier();
  if(e.key===&#x27;ArrowRight&#x27;&amp;&amp;curLesson&lt;lessons.length-1)dossierNav(1);
  if(e.key===&#x27;ArrowLeft&#x27;&amp;&amp;curLesson&gt;0)dossierNav(-1);
});

/* ---- FLASHCARDS ---- */
let deck=lessons.map((_,i)=&gt;i);
let fPos=0;
document.getElementById(&#x27;fTot&#x27;).textContent=lessons.length;
function paintFlash(){
  const l=lessons[deck[fPos]];const col=CATCOLOR[l.cat];
  document.getElementById(&#x27;flashcard&#x27;).classList.remove(&#x27;flipped&#x27;);
  document.getElementById(&#x27;flashcard&#x27;).style.setProperty(&#x27;--cat&#x27;,col);
  document.getElementById(&#x27;fIdx&#x27;).textContent=fPos+1;
  document.getElementById(&#x27;fCat&#x27;).textContent=l.cat.toUpperCase();
  document.getElementById(&#x27;ffCat&#x27;).textContent=l.cat;
  document.getElementById(&#x27;ffCat&#x27;).style.background=col;
  document.getElementById(&#x27;ffNum&#x27;).textContent=&#x27;UNIT &#x27;+String(l.num).padStart(2,&#x27;0&#x27;);
  document.getElementById(&#x27;ffQ&#x27;).textContent=l.question;
  document.getElementById(&#x27;fbA&#x27;).textContent=l.answer;
  document.getElementById(&#x27;fbM&#x27;).textContent=l.memory;
  document.getElementById(&#x27;fPrev&#x27;).disabled=fPos===0;
  document.getElementById(&#x27;fNext&#x27;).disabled=fPos===deck.length-1;
}
function flipCard(){document.getElementById(&#x27;flashcard&#x27;).classList.toggle(&#x27;flipped&#x27;);}
function flashNav(d){fPos=Math.max(0,Math.min(deck.length-1,fPos+d));paintFlash();}
function shuffleDeck(){for(let i=deck.length-1;i&gt;0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}fPos=0;paintFlash();}
paintFlash();

/* ---- EXAM ---- */
let answers={};let submitted=false;
function renderExam(){
  const b=document.getElementById(&#x27;examBody&#x27;);b.innerHTML=&#x27;&#x27;;
  practice.forEach(q=&gt;{
    const card=document.createElement(&#x27;div&#x27;);card.className=&#x27;qcard&#x27;;
    const letters=[&#x27;A&#x27;,&#x27;B&#x27;,&#x27;C&#x27;,&#x27;D&#x27;];
    card.innerHTML=`&lt;div class=&quot;qhead&quot;&gt;&lt;span class=&quot;qn&quot;&gt;${String(q.num).padStart(2,&#x27;0&#x27;)}&lt;/span&gt;&lt;span class=&quot;qtext&quot;&gt;${q.q}&lt;/span&gt;&lt;/div&gt;`;
    const opts=document.createElement(&#x27;div&#x27;);opts.className=&#x27;opts&#x27;;
    q.choices.forEach((ch,i)=&gt;{
      const o=document.createElement(&#x27;div&#x27;);o.className=&#x27;opt&#x27;;
      o.dataset.q=q.num;o.dataset.l=letters[i];
      o.innerHTML=`&lt;span class=&quot;ol&quot;&gt;${letters[i]}&lt;/span&gt;&lt;span&gt;${ch}&lt;/span&gt;`;
      o.onclick=()=&gt;{if(submitted)return;answers[q.num]=letters[i];
        opts.querySelectorAll(&#x27;.opt&#x27;).forEach(x=&gt;x.classList.remove(&#x27;selected&#x27;));
        o.classList.add(&#x27;selected&#x27;);updateSubmit();};
      opts.appendChild(o);
    });
    card.appendChild(opts);b.appendChild(card);
  });
  const sb=document.createElement(&#x27;button&#x27;);sb.className=&#x27;exam-submit&#x27;;sb.id=&#x27;examSubmit&#x27;;
  sb.textContent=&#x27;Submit Exam · 0 / 25 Answered&#x27;;sb.disabled=true;sb.onclick=gradeExam;
  b.appendChild(sb);
}
function updateSubmit(){
  const n=Object.keys(answers).length;
  const sb=document.getElementById(&#x27;examSubmit&#x27;);
  sb.textContent=`Submit Exam · ${n} / 25 Answered`;
  sb.disabled=n&lt;25;
}
function gradeExam(){
  submitted=true;let score=0;
  practice.forEach(q=&gt;{
    const correct=q.answer.letter;const chosen=answers[q.num];
    if(chosen===correct)score++;
    document.querySelectorAll(`.opt[data-q=&quot;${q.num}&quot;]`).forEach(o=&gt;{
      o.classList.remove(&#x27;selected&#x27;);
      if(o.dataset.l===correct)o.classList.add(&#x27;correct&#x27;);
      else if(o.dataset.l===chosen)o.classList.add(&#x27;wrong&#x27;);
    });
  });
  const sc=document.getElementById(&#x27;scorecard&#x27;);
  document.getElementById(&#x27;scNum&#x27;).textContent=score;
  const pct=score/25*100;
  const v=document.getElementById(&#x27;scVerdict&#x27;);
  if(pct&gt;=80){v.textContent=&#x27;Mission Ready&#x27;;v.className=&#x27;verdict pass&#x27;;}
  else{v.textContent=&#x27;Recommend Re-Drill&#x27;;v.className=&#x27;verdict review&#x27;;}
  sc.classList.add(&#x27;show&#x27;);
  document.getElementById(&#x27;examSubmit&#x27;).style.display=&#x27;none&#x27;;
  sc.scrollIntoView({behavior:&#x27;smooth&#x27;,block:&#x27;center&#x27;});
}
function resetExam(){answers={};submitted=false;document.getElementById(&#x27;scorecard&#x27;).classList.remove(&#x27;show&#x27;);renderExam();window.scrollTo({top:document.querySelector(&#x27;.viewnav&#x27;).offsetTop,behavior:&#x27;smooth&#x27;});}
renderExam();
&lt;/script&gt;

.pracitem .pbtn:hover{background:#d3c9a9}
.pracitem .pa{display:none;padding:11px 14px;background:#eef3e0;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.95rem;color:#33421f;border-top:1px solid var(--line)}
.pracitem.open .pa{display:block}
.pracitem.open .pbtn{display:none}

.dossier-nav{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding:14px 26px;background:var(--paper-2)}
.dossier-nav button{background:none;border:1px solid var(--od);color:var(--od);cursor:pointer;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;transition:all .15s}
.dossier-nav button:hover:not(:disabled){background:var(--od);color:var(--sand)}
.dossier-nav button:disabled{opacity:.3;cursor:default}

/* exam */
.exam-meta{display:flex;gap:0;flex-wrap:wrap;margin-bottom:22px;border:1px solid var(--line);background:var(--paper)}
.exam-meta .m{flex:1;min-width:110px;padding:12px 16px;border-right:1px solid var(--line)}
.exam-meta .m:last-child{border-right:none}
.exam-meta .mk{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:#7a755e}
.exam-meta .mv{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:1.2rem;font-weight:600;color:var(--ink);margin-top:2px}
.qcard{background:var(--paper);border:1px solid var(--line);padding:18px 20px;margin-bottom:14px}
.qcard .qhead{display:flex;gap:10px;margin-bottom:13px}
.qcard .qn{font-family:&#x27;Roboto Mono&#x27;,monospace;font-weight:700;color:var(--amber);background:var(--od-deep);padding:2px 9px;font-size:.78rem;height:fit-content;letter-spacing:.05em}
.qcard .qtext{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1.05rem;color:var(--ink);font-weight:700;flex:1}
.opts{display:grid;gap:8px}
.opt{display:flex;align-items:center;gap:11px;padding:10px 14px;border:1px solid var(--line);background:#fff;cursor:pointer;transition:all .12s;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.98rem}
.opt:hover{border-color:var(--od);background:#fbf8ef}
.opt .ol{font-family:&#x27;Roboto Mono&#x27;,monospace;font-weight:700;font-size:.78rem;color:var(--od);width:18px;flex:0 0 auto}
.opt.selected{border-color:var(--od);background:#efe9d6;box-shadow:inset 3px 0 0 var(--od)}
.opt.correct{border-color:var(--green);background:#e7eed3;box-shadow:inset 3px 0 0 var(--green)}
.opt.wrong{border-color:var(--rust);background:#f1ddd2;box-shadow:inset 3px 0 0 var(--rust)}
.opt.correct .ol{color:var(--green)}
.opt.wrong .ol{color:var(--rust)}
.qsol{display:none;margin-top:12px;background:var(--od-deep);color:var(--sand);padding:13px 16px;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.97rem;border-left:4px solid var(--amber)}
.qsol.show{display:block;animation:fade .3s}
.qsol .sl{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.56rem;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;margin-bottom:5px;font-weight:700;display:flex;justify-content:space-between}
.qsol .sl a{color:var(--amber-soft);text-decoration:underline;cursor:pointer;letter-spacing:.06em}
.exam-submit{background:var(--green);color:#fff;border:none;cursor:pointer;font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:.92rem;padding:14px 30px;margin-top:8px;width:100%}
.exam-submit:hover{background:#5e7a31}
.exam-submit:disabled{opacity:.4;cursor:default}
.scorecard{background:var(--od-deep);color:var(--sand);border:3px solid var(--amber);padding:28px 24px;text-align:center;margin-bottom:26px;display:none}
.scorecard.show{display:block;animation:fade .4s}
.scorecard .stamp{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;letter-spacing:.26em;color:var(--amber);text-transform:uppercase}
.scorecard .big{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:4.2rem;font-weight:700;color:var(--paper);line-height:1}
.scorecard .big small{font-size:1.4rem;color:var(--sand-2)}
.scorecard .verdict{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:1.3rem;text-transform:uppercase;letter-spacing:.1em;margin-top:6px}
.scorecard .verdict.pass{color:var(--green)}
.scorecard .verdict.review{color:var(--amber)}
.scorecard .weak{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.95rem;color:var(--sand-2);margin-top:12px}
.scorecard .weak b{color:var(--amber-soft)}
.scorecard .retake{background:none;border:1px solid var(--sand);color:var(--sand);cursor:pointer;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;padding:9px 18px;margin-top:16px}
.scorecard .retake:hover{background:var(--sand);color:var(--od-deep)}

/* study plan */
.plan{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:30px}
.day{background:var(--paper);border:1px solid var(--line);border-top:4px solid var(--amber);padding:14px}
.day .dl{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:#7a755e}
.day .dt{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:1.05rem;font-weight:600;text-transform:uppercase;color:var(--ink);margin-top:3px;line-height:1.15}
.day.test{border-top-color:var(--green)}
.day.test .dt{color:var(--green)}

.foot{background:var(--od-dark);color:var(--sand-2);border-top:1px solid rgba(216,205,176,.15);padding:26px 22px;text-align:center;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.12em}
.foot b{color:var(--amber)}

@media(max-width:600px){
  .hero{padding:38px 18px 44px}
  .spec{min-width:50%;border-bottom:1px solid rgba(216,205,176,.2)}
  .spec:nth-child(odd){border-right:1px solid rgba(216,205,176,.2)}
  .spec:nth-child(even){border-right:none}
  .dossier-body{padding:20px 18px 24px}
}

&lt;script&gt;
const DATA = {&quot;lessons&quot;: [{&quot;num&quot;: 1, &quot;title&quot;: &quot;Percent Discounts&quot;, &quot;cat&quot;: &quot;Percents&quot;, &quot;idea&quot;: &quot;A percent means &#x27;per hundred,&#x27; so 20% = 20/100 = 0.20. To take a discount off a price, you can find the discount and subtract it, or multiply by what&#x27;s left after the discount.&quot;, &quot;formula&quot;: &quot;Sale Price = Original × (1 − discount)&quot;, &quot;shortcut&quot;: &quot;Find 10% by moving the decimal one place left ($160 → $16). Build other percents from that: 20% is two 10%s, 5% is half of 10%.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;A camera normally costs $160. It is reduced 20% during a sale. What is the sale price?&quot;, &quot;steps&quot;: [&quot;20% off means you still pay 80% (100% − 20%).&quot;, &quot;Convert: 80% = 0.80.&quot;, &quot;Multiply: $160 × 0.80 = $128.&quot;, &quot;Check: 10% of $160 = $16, so 20% = $32 off. $160 − $32 = $128. ✓&quot;], &quot;answer&quot;: &quot;$128&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;A $90 jacket is marked 30% off. What is the sale price?&quot;, &quot;a&quot;: &quot;$90 × 0.70 = $63&quot;}, {&quot;q&quot;: &quot;A $250 tire is on sale for 15% off. What do you pay?&quot;, &quot;a&quot;: &quot;$250 × 0.85 = $212.50&quot;}, {&quot;q&quot;: &quot;Shoes cost $48 after a 20% discount. What was the original price?&quot;, &quot;a&quot;: &quot;$48 ÷ 0.80 = $60 (the $48 is 80% of the original)&quot;}]}, {&quot;num&quot;: 2, &quot;title&quot;: &quot;Rates, Time &amp; Distance&quot;, &quot;cat&quot;: &quot;Rates&quot;, &quot;idea&quot;: &quot;A rate connects two quantities, like miles per hour or stations per minute. If you know any two of distance, rate, and time, you can find the third. The key skill is keeping your units consistent.&quot;, &quot;formula&quot;: &quot;Distance = Rate × Time   •   Rate = Distance ÷ Time   •   Time = Distance ÷ Rate&quot;, &quot;shortcut&quot;: &quot;To scale a rate to a new time, multiply by how many of those time blocks fit. 3 stations per 10 minutes × 6 ten-minute blocks in an hour = 18 stations.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;A subway car passes 3 stations every 10 minutes. At this rate, how many stations will it pass in one hour?&quot;, &quot;steps&quot;: [&quot;One hour = 60 minutes.&quot;, &quot;How many 10-minute blocks in 60 minutes? 60 ÷ 10 = 6.&quot;, &quot;Each block = 3 stations, so 3 × 6 = 18 stations.&quot;, &quot;Check: 3 stations/10 min is the same as 18 stations/60 min. ✓&quot;], &quot;answer&quot;: &quot;18 stations&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;A car travels 1/100 of a kilometer each second. How far in one hour?&quot;, &quot;a&quot;: &quot;3600 seconds × 1/100 km = 36 km&quot;}, {&quot;q&quot;: &quot;A printer makes 9 copies every 15 seconds. How many per minute?&quot;, &quot;a&quot;: &quot;60 ÷ 15 = 4 blocks; 9 × 4 = 36 copies&quot;}, {&quot;q&quot;: &quot;A runner covers 2 miles in 16 minutes. What is the pace per mile?&quot;, &quot;a&quot;: &quot;16 ÷ 2 = 8 minutes per mile&quot;}]}, {&quot;num&quot;: 3, &quot;title&quot;: &quot;Ratios &amp; Proportions&quot;, &quot;cat&quot;: &quot;Ratios&quot;, &quot;idea&quot;: &quot;A ratio compares amounts (2 baseballs to 3 golf balls = 2:3). A proportion sets two ratios equal. Solve proportions by cross-multiplying, and simplify ratios by dividing both sides by the same number.&quot;, &quot;formula&quot;: &quot;If a/b = c/d, then a×d = b×c (cross multiply)&quot;, &quot;shortcut&quot;: &quot;Find the &#x27;one unit&#x27; value first. If 2:3 and there are 30 of the &#x27;2&#x27; part, each ratio unit = 15, so the &#x27;3&#x27; part = 45.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;On a map, 3/4 inch represents 1 mile. What distance, in miles, is shown by 1 3/4 inches?&quot;, &quot;steps&quot;: [&quot;Set up a proportion: (3/4 inch)/(1 mile) = (1 3/4 inch)/(x miles).&quot;, &quot;Write 1 3/4 as 7/4.&quot;, &quot;Cross multiply: (3/4)×x = (7/4)×1.&quot;, &quot;Solve: x = (7/4) ÷ (3/4) = 7/3 = 2 1/3 miles. ✓&quot;], &quot;answer&quot;: &quot;2 1/3 miles&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;Baseballs to golf balls is 2:3. If there are 30 baseballs, how many golf balls?&quot;, &quot;a&quot;: &quot;30 ÷ 2 = 15 per unit; 3 × 15 = 45 golf balls&quot;}, {&quot;q&quot;: &quot;The ratio 3 1/4 to 5 1/4 equals what whole-number ratio?&quot;, &quot;a&quot;: &quot;13/4 to 21/4 = 13 to 21&quot;}, {&quot;q&quot;: &quot;A recipe uses 2 cups flour per 3 eggs. How much flour for 9 eggs?&quot;, &quot;a&quot;: &quot;9 ÷ 3 = 3 units; 2 × 3 = 6 cups&quot;}]}, {&quot;num&quot;: 4, &quot;title&quot;: &quot;Fractions&quot;, &quot;cat&quot;: &quot;Fractions&quot;, &quot;idea&quot;: &quot;Fractions show parts of a whole. Convert mixed numbers to improper fractions before multiplying or dividing. To divide by a fraction, multiply by its reciprocal (flip it). &#x27;Of&#x27; usually means multiply.&quot;, &quot;formula&quot;: &quot;a/b × c/d = (a×c)/(b×d)   •   a/b ÷ c/d = a/b × d/c&quot;, &quot;shortcut&quot;: &quot;Dividing a total by a fractional amount tells you &#x27;how many fit.&#x27; 72 ÷ 3/8 = 72 × 8/3 = 192.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;A cat is fed 3/8 of a pound of food per day. For how many days will 72 pounds last?&quot;, &quot;steps&quot;: [&quot;You want how many 3/8-pound servings fit in 72 pounds: 72 ÷ 3/8.&quot;, &quot;Dividing by a fraction = multiply by its reciprocal: 72 × 8/3.&quot;, &quot;72 × 8 = 576; 576 ÷ 3 = 192.&quot;, &quot;Check: 192 days × 3/8 lb = 72 lb. ✓&quot;], &quot;answer&quot;: &quot;192 days&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;After spending 5/12 of her salary, Eva has $420 left. What is her salary?&quot;, &quot;a&quot;: &quot;Left = 7/12 of salary. $420 ÷ 7/12 = $420 × 12/7 = $720&quot;}, {&quot;q&quot;: &quot;What is 2 1/4 × 4?&quot;, &quot;a&quot;: &quot;9/4 × 4 = 9&quot;}, {&quot;q&quot;: &quot;How many 1/2-cup scoops are in 6 cups?&quot;, &quot;a&quot;: &quot;6 ÷ 1/2 = 12 scoops&quot;}]}, {&quot;num&quot;: 5, &quot;title&quot;: &quot;Probability&quot;, &quot;cat&quot;: &quot;Probability&quot;, &quot;idea&quot;: &quot;Probability measures how likely an outcome is, from 0 (never) to 1 (always). Count the outcomes you want, divide by the total number of equally likely outcomes. For &#x27;either/or&#x27; with separate groups, add the favorable counts first.&quot;, &quot;formula&quot;: &quot;Probability = Favorable Outcomes ÷ Total Outcomes&quot;, &quot;shortcut&quot;: &quot;For &#x27;red or black,&#x27; add red + black, then divide by the total. Always simplify the final fraction.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;Marty has 5 blue pens, 6 black pens, and 4 red pens. He pulls one at random. What is the probability it is red or black?&quot;, &quot;steps&quot;: [&quot;Total pens: 5 + 6 + 4 = 15.&quot;, &quot;Favorable (red or black): 4 + 6 = 10.&quot;, &quot;Probability = 10/15.&quot;, &quot;Simplify: divide top and bottom by 5 → 2/3. ✓&quot;], &quot;answer&quot;: &quot;2/3&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;A bag has 3 white and 7 green marbles. P(white)?&quot;, &quot;a&quot;: &quot;3/(3+7) = 3/10&quot;}, {&quot;q&quot;: &quot;A die is rolled. P(rolling a 5 or 6)?&quot;, &quot;a&quot;: &quot;2/6 = 1/3&quot;}, {&quot;q&quot;: &quot;8 red, 4 blue, 8 yellow cards. P(red or yellow)?&quot;, &quot;a&quot;: &quot;(8+8)/20 = 16/20 = 4/5&quot;}]}, {&quot;num&quot;: 6, &quot;title&quot;: &quot;Prime Factorization&quot;, &quot;cat&quot;: &quot;Number Sense&quot;, &quot;idea&quot;: &quot;Every whole number is a product of prime numbers (2, 3, 5, 7, 11…). Build a factor tree: split the number into any two factors, then keep splitting until everything is prime. The order doesn&#x27;t matter, but each prime must appear the right number of times.&quot;, &quot;formula&quot;: &quot;Prime factorization = the unique set of primes whose product is the number&quot;, &quot;shortcut&quot;: &quot;Start by pulling out small primes: keep dividing by 2 while even, then try 3, then 5, then 7.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;What is the prime factorization of 140?&quot;, &quot;steps&quot;: [&quot;140 is even: 140 = 2 × 70.&quot;, &quot;70 is even: 70 = 2 × 35.&quot;, &quot;35 = 5 × 7, both prime.&quot;, &quot;So 140 = 2 × 2 × 5 × 7. ✓&quot;], &quot;answer&quot;: &quot;2 × 2 × 5 × 7&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;Prime factorization of 60?&quot;, &quot;a&quot;: &quot;2 × 2 × 3 × 5&quot;}, {&quot;q&quot;: &quot;Prime factorization of 4! (which is 24)?&quot;, &quot;a&quot;: &quot;24 = 2 × 2 × 2 × 3&quot;}, {&quot;q&quot;: &quot;What is 4! ?&quot;, &quot;a&quot;: &quot;4 × 3 × 2 × 1 = 24&quot;}]}, {&quot;num&quot;: 7, &quot;title&quot;: &quot;Percent Increase &amp; Decrease&quot;, &quot;cat&quot;: &quot;Percents&quot;, &quot;idea&quot;: &quot;Percent change is always measured against the starting value. A decrease then an increase do NOT cancel out, because the second percent is taken from a different base. To stack changes, multiply the factors.&quot;, &quot;formula&quot;: &quot;New = Old × (1 ± percent)   •   Percent change = (change ÷ original) × 100&quot;, &quot;shortcut&quot;: &quot;To reverse a 20% drop you need MORE than 20% back: the drop was off the big number, the recovery is off the smaller number.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;A stock drops 20%. By what percent must it rise to return to its original value?&quot;, &quot;steps&quot;: [&quot;Say it started at $100. After −20%: $100 × 0.80 = $80.&quot;, &quot;It must climb from $80 back to $100, a gain of $20.&quot;, &quot;Percent increase = change ÷ new base = 20 ÷ 80 = 0.25.&quot;, &quot;0.25 = 25%. ✓&quot;], &quot;answer&quot;: &quot;25%&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;Population rises 100% then 50%. Total increase?&quot;, &quot;a&quot;: &quot;×2 then ×1.5 = ×3 → 200% increase&quot;}, {&quot;q&quot;: &quot;A $50 item rises 10% then falls 10%. Final price?&quot;, &quot;a&quot;: &quot;50 × 1.1 × 0.9 = $49.50 (not $50)&quot;}, {&quot;q&quot;: &quot;A price falls 25%. What rise restores it?&quot;, &quot;a&quot;: &quot;0.25 ÷ 0.75 = 33 1/3%&quot;}]}, {&quot;num&quot;: 8, &quot;title&quot;: &quot;Work Problems&quot;, &quot;cat&quot;: &quot;Work &amp; Wages&quot;, &quot;idea&quot;: &quot;When people work together, their RATES add, not their times. If someone finishes in T minutes, their rate is 1/T of the job per minute. Add the rates to find the combined rate, then flip it to get the combined time.&quot;, &quot;formula&quot;: &quot;1/T = 1/A + 1/B   (then T = combined time)&quot;, &quot;shortcut&quot;: &quot;Working together is always FASTER than the fastest single worker — use that to rule out answer choices.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;Joan shovels a driveway in 50 minutes; Mary in 20 minutes. How long together (nearest minute)?&quot;, &quot;steps&quot;: [&quot;Joan&#x27;s rate = 1/50 per minute; Mary&#x27;s = 1/20 per minute.&quot;, &quot;Add rates: 1/50 + 1/20. Common denominator 100 → 2/100 + 5/100 = 7/100.&quot;, &quot;Combined time = flip the rate = 100/7 ≈ 14.3 minutes.&quot;, &quot;Nearest minute = 14. (Faster than Mary&#x27;s 20 alone. ✓)&quot;], &quot;answer&quot;: &quot;14 minutes&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;A pipe fills a tank in 6 hr, another in 3 hr. Together?&quot;, &quot;a&quot;: &quot;1/6 + 1/3 = 1/6 + 2/6 = 3/6 = 1/2 → 2 hours&quot;}, {&quot;q&quot;: &quot;Worker A: 4 hr, Worker B: 4 hr. Together?&quot;, &quot;a&quot;: &quot;1/4 + 1/4 = 1/2 → 2 hours&quot;}, {&quot;q&quot;: &quot;Why can&#x27;t two workers each taking 30 min finish in 40 min together?&quot;, &quot;a&quot;: &quot;Together must be faster than 30 min, so 40 is impossible&quot;}]}, {&quot;num&quot;: 9, &quot;title&quot;: &quot;Salary &amp; Wage Problems&quot;, &quot;cat&quot;: &quot;Work &amp; Wages&quot;, &quot;idea&quot;: &quot;These problems turn sentences into equations. Find the hourly rate first. Overtime is usually &#x27;time and a half&#x27; (1.5 × regular rate) for hours beyond 40. Read carefully for &#x27;more than&#x27; and &#x27;less than&#x27; chains.&quot;, &quot;formula&quot;: &quot;Pay = Regular hours × rate + Overtime hours × (1.5 × rate)&quot;, &quot;shortcut&quot;: &quot;For &#x27;A is $70 less than B, B is $50 more than C,&#x27; work from the known person outward, one step at a time.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;A worker earns $200 for the first 40 hours, then 1.5× the regular rate after that. How many hours to earn $230?&quot;, &quot;steps&quot;: [&quot;Regular rate = $200 ÷ 40 = $5/hour.&quot;, &quot;Overtime rate = 1.5 × $5 = $7.50/hour.&quot;, &quot;Needs $230 − $200 = $30 more from overtime.&quot;, &quot;$30 ÷ $7.50 = 4 overtime hours → 40 + 4 = 44 hours total. ✓&quot;], &quot;answer&quot;: &quot;44 hours&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;June earns $70 less than Kelly; Kelly earns $50 more than Eileen; Eileen earns $280. June&#x27;s pay?&quot;, &quot;a&quot;: &quot;Kelly = 280 + 50 = 330; June = 330 − 70 = $260&quot;}, {&quot;q&quot;: &quot;A painter at $12/hr and son at $6/hr work the same time; combined charge $108. Hours each?&quot;, &quot;a&quot;: &quot;(12 + 6) × t = 108 → t = 6 hours&quot;}, {&quot;q&quot;: &quot;Regular rate $8/hr. What is the overtime rate at time-and-a-half?&quot;, &quot;a&quot;: &quot;1.5 × 8 = $12/hour&quot;}]}, {&quot;num&quot;: 10, &quot;title&quot;: &quot;Mental Math &amp; ASVAB Shortcuts&quot;, &quot;cat&quot;: &quot;Strategy&quot;, &quot;idea&quot;: &quot;The AR section is timed (about 72 seconds per question), so speed matters. Estimate to eliminate impossible choices, round to friendly numbers, and watch for answer choices that are &#x27;traps&#x27; built from a common mistake.&quot;, &quot;formula&quot;: &quot;Estimate first → eliminate → compute only what&#x27;s left&quot;, &quot;shortcut&quot;: &quot;10% tricks, doubling/halving, and &#x27;does this answer even make sense?&#x27; checks save more points than raw calculation. If two workers team up, the answer must be smaller than either alone.&quot;, &quot;example&quot;: {&quot;q&quot;: &quot;Four people share a $36 taxi fare plus a 25% tip, split evenly. How much does each pay?&quot;, &quot;steps&quot;: [&quot;Tip = 25% of $36 = $9. Total = $36 + $9 = $45.&quot;, &quot;Split four ways: $45 ÷ 4 = $11.25.&quot;, &quot;Estimate check: $45/4 is a bit over $11, so $11.25 fits.&quot;, &quot;Trap: $9.00 (forgetting the tip, 36÷4) is a wrong choice. ✓&quot;], &quot;answer&quot;: &quot;$11.25&quot;}, &quot;practice&quot;: [{&quot;q&quot;: &quot;Quickly estimate 19% of $200.&quot;, &quot;a&quot;: &quot;≈ 20% = $40 (slightly less)&quot;}, {&quot;q&quot;: &quot;2 1/4 lb of lumber at $4.00/lb plus 7% tax. Total?&quot;, &quot;a&quot;: &quot;2.25 × 4 = $9.00; ×1.07 = $9.63&quot;}, {&quot;q&quot;: &quot;Garage A: $8.75 first hour + $1.25 each more. Cost for 5 hours?&quot;, &quot;a&quot;: &quot;8.75 + 1.25×4 = $13.75&quot;}]}], &quot;exam&quot;: [{&quot;num&quot;: 1, &quot;q&quot;: &quot;John bought a camera on sale that normally costs $160. If the price was reduced 20% during the sale, what was the sale price of the camera?&quot;, &quot;choices&quot;: [&quot;$120&quot;, &quot;$124&quot;, &quot;$128&quot;, &quot;$140&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;lesson&quot;: 1, &quot;sol&quot;: &quot;You still pay 100% − 20% = 80%. $160 × 0.80 = $128. (10% of 160 is $16, so 20% off is $32; 160 − 32 = 128.)&quot;}, {&quot;num&quot;: 2, &quot;q&quot;: &quot;A subway car passes 3 stations every 10 minutes. At this rate, how many stations will it pass in one hour?&quot;, &quot;choices&quot;: [&quot;15&quot;, &quot;18&quot;, &quot;20&quot;, &quot;30&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;lesson&quot;: 2, &quot;sol&quot;: &quot;One hour has six 10-minute blocks (60 ÷ 10 = 6). 3 stations per block × 6 = 18 stations.&quot;}, {&quot;num&quot;: 3, &quot;q&quot;: &quot;On a certain map, 3/4 inch represents one mile. What distance, in miles, is represented by 1 3/4 inches?&quot;, &quot;choices&quot;: [&quot;1 1/2&quot;, &quot;2 1/3&quot;, &quot;2 1/2&quot;, &quot;5 1/4&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;lesson&quot;: 3, &quot;sol&quot;: &quot;1 3/4 = 7/4. Divide map inches by the per-mile inches: (7/4) ÷ (3/4) = 7/3 = 2 1/3 miles.&quot;}, {&quot;num&quot;: 4, &quot;q&quot;: &quot;A box contains baseballs and golf balls. If the ratio of baseballs to golf balls is 2:3 and there are 30 baseballs, how many golf balls are there?&quot;, &quot;choices&quot;: [&quot;18&quot;, &quot;20&quot;, &quot;36&quot;, &quot;45&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;lesson&quot;: 3, &quot;sol&quot;: &quot;30 baseballs ÷ 2 = 15 per ratio unit. Golf balls = 3 units × 15 = 45.&quot;}, {&quot;num&quot;: 5, &quot;q&quot;: &quot;Four people shared a taxi. The fare was $36.00, and they gave a tip equal to 25% of the fare. If they equally shared the cost of fare and tip, how much did each person pay?&quot;, &quot;choices&quot;: [&quot;$9.75&quot;, &quot;$10.25&quot;, &quot;$10.75&quot;, &quot;$11.25&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;lesson&quot;: 10, &quot;sol&quot;: &quot;Tip = 25% of $36 = $9. Total = $45. Split four ways: $45 ÷ 4 = $11.25.&quot;}, {&quot;num&quot;: 6, &quot;q&quot;: &quot;If a car travels 1/100 of a kilometer each second, how many kilometers does it travel in an hour?&quot;, &quot;choices&quot;: [&quot;36&quot;, &quot;60&quot;, &quot;72&quot;, &quot;100&quot;], &quot;ans&quot;: &quot;A&quot;, &quot;lesson&quot;: 2, &quot;sol&quot;: &quot;One hour = 3600 seconds. 3600 × 1/100 = 36 km.&quot;}, {&quot;num&quot;: 7, &quot;q&quot;: &quot;20 − (−5) =&quot;, &quot;choices&quot;: [&quot;−25&quot;, &quot;25&quot;, &quot;15&quot;, &quot;−15&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;lesson&quot;: 6, &quot;sol&quot;: &quot;Subtracting a negative is adding: 20 − (−5) = 20 + 5 = 25.&quot;}, {&quot;num&quot;: 8, &quot;q&quot;: &quot;Ms. Smith drove 700 miles. Her car averaged 35 miles per gallon and gasoline cost $1.25 per gallon. What was the cost of the gasoline for the trip?&quot;, &quot;choices&quot;: [&quot;$20.00&quot;, &quot;$24.00&quot;, &quot;$25.00&quot;, &quot;$40.00&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;lesson&quot;: 2, &quot;sol&quot;: &quot;Gallons used = 700 ÷ 35 = 20. Cost = 20 × $1.25 = $25.00.&quot;}, {&quot;num&quot;: 9, &quot;q&quot;: &quot;After eating 25% of the jelly beans, Brett had 72 left. How many jelly beans did Brett have originally?&quot;, &quot;choices&quot;: [&quot;90&quot;, &quot;94&quot;, &quot;95&quot;, &quot;96&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;lesson&quot;: 1, &quot;sol&quot;: &quot;If 25% is eaten, 75% remains. 72 is 75% of the original: 72 ÷ 0.75 = 96.&quot;}, {&quot;num&quot;: 10, &quot;q&quot;: &quot;A student finishes the first half of an exam in 2/3 the time it takes to finish the second half. If the entire exam takes one hour, how many minutes does he spend on the first half?&quot;, &quot;choices&quot;: [&quot;20&quot;, &quot;24&quot;, &quot;27&quot;, &quot;36&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;lesson&quot;: 4, &quot;sol&quot;: &quot;Let second half = t. First half = (2/3)t. Together: (2/3)t + t = 60 → (5/3)t = 60 → t = 36. First half = (2/3)(36) = 24 minutes.&quot;}, {&quot;num&quot;: 11, &quot;q&quot;: &quot;A 25-ounce solution is 20% alcohol. If 50 ounces of water are added, what percent of the new solution is alcohol?&quot;, &quot;choices&quot;: [&quot;6 2/3%&quot;, &quot;7 1/2%&quot;, &quot;10%&quot;, &quot;13 1/3%&quot;], &quot;ans&quot;: &quot;A&quot;, &quot;lesson&quot;: 7, &quot;sol&quot;: &quot;Alcohol amount = 20% of 25 = 5 oz (unchanged). New total = 25 + 50 = 75 oz. 5 ÷ 75 = 1/15 = 6 2/3%.&quot;}, {&quot;num&quot;: 12, &quot;q&quot;: &quot;Marty has 5 blue pens, 6 black pens, and 4 red pens. If he pulls one at random, what is the probability the pen is either red or black?&quot;, &quot;choices&quot;: [&quot;2/3&quot;, &quot;3/5&quot;, &quot;2/5&quot;, &quot;1/3&quot;], &quot;ans&quot;: &quot;A&quot;, &quot;lesson&quot;: 5, &quot;sol&quot;: &quot;Total = 15. Red or black = 4 + 6 = 10. 10/15 = 2/3.&quot;}, {&quot;num&quot;: 13, &quot;q&quot;: &quot;From 1980 to 1990 the population of Country X increased 100%. From 1990 to 2000 it increased 50%. What was the combined increase for 1980–2000?&quot;, &quot;choices&quot;: [&quot;150%&quot;, &quot;166 2/3%&quot;, &quot;175%&quot;, &quot;200%&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;lesson&quot;: 7, &quot;sol&quot;: &quot;Multiply the growth factors: ×2.0 then ×1.5 = ×3.0. Tripling is a 200% increase.&quot;}, {&quot;num&quot;: 14, &quot;q&quot;: &quot;A worker earns $200 for the first 40 hours, then is paid one-and-one-half times her regular rate for additional hours. How many hours must she work to make $230 in a week?&quot;, &quot;choices&quot;: [&quot;43&quot;, &quot;44&quot;, &quot;45&quot;, &quot;46&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;lesson&quot;: 9, &quot;sol&quot;: &quot;Regular rate = 200 ÷ 40 = $5/hr. Overtime = 1.5 × 5 = $7.50/hr. Need $30 more: 30 ÷ 7.50 = 4 OT hours. Total = 44 hours.&quot;}, {&quot;num&quot;: 15, &quot;q&quot;: &quot;If 50% of x is 150, what is 75% of x?&quot;, &quot;choices&quot;: [&quot;225&quot;, &quot;250&quot;, &quot;275&quot;, &quot;300&quot;], &quot;ans&quot;: &quot;A&quot;, &quot;lesson&quot;: 1, &quot;sol&quot;: &quot;50% of x = 150 means x = 300. 75% of 300 = 225.&quot;}, {&quot;num&quot;: 16, &quot;q&quot;: &quot;The total fare for two adults and three children on an excursion boat is $14. If each child&#x27;s fare is half of each adult&#x27;s fare, what is the adult fare?&quot;, &quot;choices&quot;: [&quot;$2.00&quot;, &quot;$3.00&quot;, &quot;$3.50&quot;, &quot;$4.00&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;lesson&quot;: 9, &quot;sol&quot;: &quot;Let adult = a, child = a/2. 2a + 3(a/2) = 14 → 2a + 1.5a = 14 → 3.5a = 14 → a = $4.00.&quot;}, {&quot;num&quot;: 17, &quot;q&quot;: &quot;What is the prime factorization of 140?&quot;, &quot;choices&quot;: [&quot;2 × 70&quot;, &quot;2 × 3 × 5 × 7&quot;, &quot;2 × 2 × 5 × 7&quot;, &quot;2 × 2 × 2 × 5 × 7&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;lesson&quot;: 6, &quot;sol&quot;: &quot;140 = 2 × 70 = 2 × 2 × 35 = 2 × 2 × 5 × 7. (2×70 isn&#x27;t all primes; the product 2×2×2×5×7 = 280, too big.)&quot;}, {&quot;num&quot;: 18, &quot;q&quot;: &quot;A painter charges $12 an hour while his son charges $6 an hour. If father and son worked the same amount of time together and the combined charge was $108, how many hours did each work?&quot;, &quot;choices&quot;: [&quot;6&quot;, &quot;9&quot;, &quot;12&quot;, &quot;18&quot;], &quot;ans&quot;: &quot;A&quot;, &quot;lesson&quot;: 9, &quot;sol&quot;: &quot;Together they charge $12 + $6 = $18 per hour. $108 ÷ $18 = 6 hours each.&quot;}, {&quot;num&quot;: 19, &quot;q&quot;: &quot;4! =&quot;, &quot;choices&quot;: [&quot;4&quot;, &quot;16&quot;, &quot;24&quot;, &quot;256&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;lesson&quot;: 6, &quot;sol&quot;: &quot;The factorial 4! means 4 × 3 × 2 × 1 = 24.&quot;}, {&quot;num&quot;: 20, &quot;q&quot;: &quot;At garage A it costs $8.75 for the first hour and $1.25 for each additional hour. At garage B it costs $5.50 for the first hour and $2.50 for each additional hour. What is the difference in cost to park for 5 hours?&quot;, &quot;choices&quot;: [&quot;$2.25&quot;, &quot;$1.75&quot;, &quot;$1.50&quot;, &quot;$1.25&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;lesson&quot;: 10, &quot;sol&quot;: &quot;Garage A: 8.75 + 1.25×4 = $13.75. Garage B: 5.50 + 2.50×4 = $15.50. Difference = 15.50 − 13.75 = $1.75.&quot;}, {&quot;num&quot;: 21, &quot;q&quot;: &quot;Jan types at an average rate of 12 pages per hour. How long will it take Jan to type 100 pages?&quot;, &quot;choices&quot;: [&quot;8 hr 10 min&quot;, &quot;8 hr 15 min&quot;, &quot;8 hr 20 min&quot;, &quot;8 hr 30 min&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;lesson&quot;: 2, &quot;sol&quot;: &quot;100 ÷ 12 = 8 1/3 hours. 1/3 of an hour = 20 minutes → 8 hr 20 min.&quot;}, {&quot;num&quot;: 22, &quot;q&quot;: &quot;Two large sodas contain the same amount as three medium sodas. Two medium sodas contain the same as three small sodas. How many small sodas contain the same amount as eight large sodas?&quot;, &quot;choices&quot;: [&quot;24&quot;, &quot;18&quot;, &quot;16&quot;, &quot;12&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;lesson&quot;: 3, &quot;sol&quot;: &quot;2L = 3M, so 8L = 12M. 2M = 3S, so 12M = 18S. Eight large = 18 small.&quot;}, {&quot;num&quot;: 23, &quot;q&quot;: &quot;If each digit 5 in the number 258,546 is replaced with the digit 7, by how much will the number be increased?&quot;, &quot;choices&quot;: [&quot;2,020&quot;, &quot;2,200&quot;, &quot;20,020&quot;, &quot;20,200&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;lesson&quot;: 6, &quot;sol&quot;: &quot;The 5s sit in the ten-thousands place and the hundreds place. Each rises by 2: 2×10,000 + 2×100 = 20,000 + 200 = 20,200.&quot;}, {&quot;num&quot;: 24, &quot;q&quot;: &quot;Michael bought 2 1/4 pounds of lumber at $4.00 per pound. If a 7% sales tax was added, how much did Michael pay?&quot;, &quot;choices&quot;: [&quot;$9.63&quot;, &quot;$9.98&quot;, &quot;$10.70&quot;, &quot;$11.77&quot;], &quot;ans&quot;: &quot;A&quot;, &quot;lesson&quot;: 10, &quot;sol&quot;: &quot;2 1/4 × $4 = $9.00. Tax: $9.00 × 1.07 = $9.63.&quot;}, {&quot;num&quot;: 25, &quot;q&quot;: &quot;The ratio of 3 1/4 to 5 1/4 is equivalent to the ratio of&quot;, &quot;choices&quot;: [&quot;3 to 5&quot;, &quot;4 to 7&quot;, &quot;8 to 13&quot;, &quot;13 to 21&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;lesson&quot;: 3, &quot;sol&quot;: &quot;3 1/4 = 13/4 and 5 1/4 = 21/4. Same denominator, so the ratio is 13 to 21.&quot;}, {&quot;num&quot;: 26, &quot;q&quot;: &quot;A cat is fed 3/8 of a pound of cat food every day. For how many days will 72 pounds of food feed the cat?&quot;, &quot;choices&quot;: [&quot;160&quot;, &quot;172&quot;, &quot;180&quot;, &quot;192&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;lesson&quot;: 4, &quot;sol&quot;: &quot;72 ÷ 3/8 = 72 × 8/3 = 192 days.&quot;}, {&quot;num&quot;: 27, &quot;q&quot;: &quot;After spending 5/12 of her salary, Eva has $420 left. What is her salary?&quot;, &quot;choices&quot;: [&quot;$175&quot;, &quot;$245&quot;, &quot;$720&quot;, &quot;$1,008&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;lesson&quot;: 4, &quot;sol&quot;: &quot;She kept 1 − 5/12 = 7/12 of her salary, which is $420. Salary = $420 ÷ 7/12 = $420 × 12/7 = $720.&quot;}, {&quot;num&quot;: 28, &quot;q&quot;: &quot;A stock decreases in value by 20%. By what percent must the stock price increase to reach its former value?&quot;, &quot;choices&quot;: [&quot;15%&quot;, &quot;20%&quot;, &quot;25%&quot;, &quot;40%&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;lesson&quot;: 7, &quot;sol&quot;: &quot;Start at $100 → drops to $80. To regain $20 from $80: 20 ÷ 80 = 25%.&quot;}, {&quot;num&quot;: 29, &quot;q&quot;: &quot;Joan can shovel a driveway in 50 minutes. Mary can shovel the same driveway in 20 minutes. How long, to the nearest minute, if they work together?&quot;, &quot;choices&quot;: [&quot;12&quot;, &quot;13&quot;, &quot;14&quot;, &quot;15&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;lesson&quot;: 8, &quot;sol&quot;: &quot;Combined rate = 1/50 + 1/20 = 2/100 + 5/100 = 7/100. Time = 100/7 ≈ 14.3 → 14 minutes.&quot;}, {&quot;num&quot;: 30, &quot;q&quot;: &quot;June&#x27;s weekly salary is $70 less than Kelly&#x27;s, which is $50 more than Eileen&#x27;s. If Eileen earns $280 per week, how much does June earn per week?&quot;, &quot;choices&quot;: [&quot;$160&quot;, &quot;$260&quot;, &quot;$280&quot;, &quot;$300&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;lesson&quot;: 9, &quot;sol&quot;: &quot;Kelly = Eileen + $50 = $330. June = Kelly − $70 = $260.&quot;}]};
const CATCOLOR = {
  &#x27;Percents&#x27;:&#x27;#c9772a&#x27;,&#x27;Rates&#x27;:&#x27;#3f7c9c&#x27;,&#x27;Ratios&#x27;:&#x27;#6f8f3a&#x27;,&#x27;Fractions&#x27;:&#x27;#7a5aa0&#x27;,
  &#x27;Probability&#x27;:&#x27;#a8431f&#x27;,&#x27;Number Sense&#x27;:&#x27;#2e7d6b&#x27;,&#x27;Work &amp; Wages&#x27;:&#x27;#9a6a2e&#x27;,&#x27;Strategy&#x27;:&#x27;#566023&#x27;
};
const lessons = DATA.lessons, exam = DATA.exam;

document.querySelectorAll(&#x27;#viewnav button&#x27;).forEach(b=&gt;{
  b.onclick=()=&gt;{
    document.querySelectorAll(&#x27;#viewnav button&#x27;).forEach(x=&gt;x.classList.remove(&#x27;active&#x27;));
    document.querySelectorAll(&#x27;.view&#x27;).forEach(x=&gt;x.classList.remove(&#x27;active&#x27;));
    b.classList.add(&#x27;active&#x27;);
    document.getElementById(&#x27;view-&#x27;+b.dataset.view).classList.add(&#x27;active&#x27;);
    window.scrollTo({top:document.querySelector(&#x27;.viewnav&#x27;).offsetTop-1,behavior:&#x27;smooth&#x27;});
  };
});
function switchView(v){document.querySelector(&#x27;#viewnav button[data-view=&quot;&#x27;+v+&#x27;&quot;]&#x27;).click();}

/* filters + roster */
let activeFilter=&#x27;All&#x27;;
const cats=[&#x27;All&#x27;,...[...new Set(lessons.map(l=&gt;l.cat))]];
const fc=document.getElementById(&#x27;filters&#x27;);
cats.forEach(c=&gt;{
  const b=document.createElement(&#x27;button&#x27;);
  b.className=&#x27;chip&#x27;+(c===&#x27;All&#x27;?&#x27; active&#x27;:&#x27;&#x27;);
  b.textContent=c===&#x27;All&#x27;?&#x27;All Concepts&#x27;:c;
  b.onclick=()=&gt;{activeFilter=c;document.querySelectorAll(&#x27;.chip&#x27;).forEach(x=&gt;x.classList.remove(&#x27;active&#x27;));b.classList.add(&#x27;active&#x27;);renderRoster();};
  fc.appendChild(b);
});
function renderRoster(){
  const r=document.getElementById(&#x27;roster&#x27;);r.innerHTML=&#x27;&#x27;;
  lessons.filter(l=&gt;activeFilter===&#x27;All&#x27;||l.cat===activeFilter).forEach(l=&gt;{
    const col=CATCOLOR[l.cat]||&#x27;#888&#x27;;
    const c=document.createElement(&#x27;div&#x27;);
    c.className=&#x27;card&#x27;;c.style.setProperty(&#x27;--cat&#x27;,col);
    c.innerHTML=`&lt;div class=&quot;cardtop&quot;&gt;&lt;span class=&quot;lnum&quot;&gt;UNIT ${String(l.num).padStart(2,&#x27;0&#x27;)}&lt;/span&gt;&lt;span class=&quot;catpill&quot;&gt;${l.cat}&lt;/span&gt;&lt;/div&gt;
      &lt;h3&gt;${l.title}&lt;/h3&gt;
      &lt;div class=&quot;formula&quot;&gt;${l.formula}&lt;/div&gt;
      &lt;span class=&quot;go&quot;&gt;OPEN ▸&lt;/span&gt;`;
    c.onclick=()=&gt;openDossier(l.num);
    r.appendChild(c);
  });
}
renderRoster();

/* dossier */
let curLesson=0;
function openDossier(num){curLesson=lessons.findIndex(l=&gt;l.num===num);paintDossier();document.getElementById(&#x27;scrim&#x27;).classList.add(&#x27;open&#x27;);document.body.style.overflow=&#x27;hidden&#x27;;}
function paintDossier(){
  const l=lessons[curLesson];const col=CATCOLOR[l.cat]||&#x27;#888&#x27;;
  document.getElementById(&#x27;dossier&#x27;).style.setProperty(&#x27;--cat&#x27;,col);
  document.getElementById(&#x27;dNum&#x27;).textContent=&#x27;UNIT &#x27;+String(l.num).padStart(2,&#x27;0&#x27;)+&#x27; / 10&#x27;;
  document.getElementById(&#x27;dCat&#x27;).textContent=l.cat;document.getElementById(&#x27;dCat&#x27;).style.background=col;
  document.getElementById(&#x27;dBody&#x27;).innerHTML=`
    &lt;h2&gt;${l.title}&lt;/h2&gt;
    &lt;div class=&quot;block&quot;&gt;&lt;div class=&quot;bh&quot;&gt;The Idea&lt;/div&gt;&lt;p&gt;${l.idea}&lt;/p&gt;&lt;/div&gt;
    &lt;div class=&quot;block formbox&quot;&gt;&lt;div class=&quot;flbl&quot;&gt;Formula&lt;/div&gt;${l.formula}&lt;/div&gt;
    &lt;div class=&quot;block shortcut&quot;&gt;&lt;div class=&quot;mlbl&quot;&gt;Fast Shortcut&lt;/div&gt;&lt;div class=&quot;mtxt&quot;&gt;${l.shortcut}&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;block&quot;&gt;&lt;div class=&quot;bh&quot;&gt;Worked Example&lt;/div&gt;
      &lt;div class=&quot;worked&quot;&gt;
        &lt;div class=&quot;wq&quot;&gt;${l.example.q}&lt;/div&gt;
        &lt;ol&gt;${l.example.steps.map(s=&gt;`&lt;li&gt;${s}&lt;/li&gt;`).join(&#x27;&#x27;)}&lt;/ol&gt;
        &lt;div class=&quot;wa&quot;&gt;&lt;span&gt;Answer&lt;/span&gt;${l.example.answer}&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;block&quot;&gt;&lt;div class=&quot;bh&quot;&gt;Practice — Reveal Each Solution&lt;/div&gt;
      ${l.practice.map((p,i)=&gt;`
        &lt;div class=&quot;pracitem&quot; id=&quot;prac-${i}&quot;&gt;
          &lt;div class=&quot;pq&quot;&gt;&lt;span class=&quot;pn&quot;&gt;${i+1}.&lt;/span&gt;&lt;span&gt;${p.q}&lt;/span&gt;&lt;/div&gt;
          &lt;button class=&quot;pbtn&quot; onclick=&quot;document.getElementById(&#x27;prac-${i}&#x27;).classList.add(&#x27;open&#x27;)&quot;&gt;▾ Reveal solution&lt;/button&gt;
          &lt;div class=&quot;pa&quot;&gt;${p.a}&lt;/div&gt;
        &lt;/div&gt;`).join(&#x27;&#x27;)}
    &lt;/div&gt;`;
  document.getElementById(&#x27;dPrev&#x27;).disabled=curLesson===0;
  document.getElementById(&#x27;dNext&#x27;).disabled=curLesson===lessons.length-1;
  document.querySelector(&#x27;.scrim&#x27;).scrollTop=0;document.getElementById(&#x27;dossier&#x27;).scrollIntoView({block:&#x27;start&#x27;});
}
function dossierNav(d){curLesson=Math.max(0,Math.min(lessons.length-1,curLesson+d));paintDossier();}
function closeDossier(){document.getElementById(&#x27;scrim&#x27;).classList.remove(&#x27;open&#x27;);document.body.style.overflow=&#x27;&#x27;;}
document.addEventListener(&#x27;keydown&#x27;,e=&gt;{
  if(!document.getElementById(&#x27;scrim&#x27;).classList.contains(&#x27;open&#x27;))return;
  if(e.key===&#x27;Escape&#x27;)closeDossier();
  if(e.key===&#x27;ArrowRight&#x27;&amp;&amp;curLesson&lt;lessons.length-1)dossierNav(1);
  if(e.key===&#x27;ArrowLeft&#x27;&amp;&amp;curLesson&gt;0)dossierNav(-1);
});

/* exam */
let answers={},submitted=false;
function renderExam(){
  const b=document.getElementById(&#x27;examBody&#x27;);b.innerHTML=&#x27;&#x27;;
  const letters=[&#x27;A&#x27;,&#x27;B&#x27;,&#x27;C&#x27;,&#x27;D&#x27;];
  exam.forEach(q=&gt;{
    const card=document.createElement(&#x27;div&#x27;);card.className=&#x27;qcard&#x27;;card.id=&#x27;q-&#x27;+q.num;
    card.innerHTML=`&lt;div class=&quot;qhead&quot;&gt;&lt;span class=&quot;qn&quot;&gt;${String(q.num).padStart(2,&#x27;0&#x27;)}&lt;/span&gt;&lt;span class=&quot;qtext&quot;&gt;${q.q}&lt;/span&gt;&lt;/div&gt;`;
    const opts=document.createElement(&#x27;div&#x27;);opts.className=&#x27;opts&#x27;;
    q.choices.forEach((ch,i)=&gt;{
      const o=document.createElement(&#x27;div&#x27;);o.className=&#x27;opt&#x27;;o.dataset.q=q.num;o.dataset.l=letters[i];
      o.innerHTML=`&lt;span class=&quot;ol&quot;&gt;${letters[i]}&lt;/span&gt;&lt;span&gt;${ch}&lt;/span&gt;`;
      o.onclick=()=&gt;{if(submitted)return;answers[q.num]=letters[i];opts.querySelectorAll(&#x27;.opt&#x27;).forEach(x=&gt;x.classList.remove(&#x27;selected&#x27;));o.classList.add(&#x27;selected&#x27;);updateSubmit();};
      opts.appendChild(o);
    });
    card.appendChild(opts);
    const sol=document.createElement(&#x27;div&#x27;);sol.className=&#x27;qsol&#x27;;sol.id=&#x27;sol-&#x27;+q.num;
    const lesson=lessons.find(l=&gt;l.num===q.lesson);
    sol.innerHTML=`&lt;div class=&quot;sl&quot;&gt;&lt;span&gt;Worked Solution&lt;/span&gt;&lt;a onclick=&quot;closeAndOpen(${q.lesson})&quot;&gt;▸ Unit ${String(q.lesson).padStart(2,&#x27;0&#x27;)}: ${lesson.title}&lt;/a&gt;&lt;/div&gt;${q.sol}`;
    card.appendChild(sol);
    b.appendChild(card);
  });
  const sb=document.createElement(&#x27;button&#x27;);sb.className=&#x27;exam-submit&#x27;;sb.id=&#x27;examSubmit&#x27;;sb.textContent=&#x27;Submit Exam · 0 / 30 Answered&#x27;;sb.disabled=true;sb.onclick=gradeExam;
  b.appendChild(sb);
}
function closeAndOpen(num){switchView(&#x27;lessons&#x27;);setTimeout(()=&gt;openDossier(num),120);}
function updateSubmit(){const n=Object.keys(answers).length;const sb=document.getElementById(&#x27;examSubmit&#x27;);sb.textContent=`Submit Exam · ${n} / 30 Answered`;sb.disabled=n&lt;30;}
function gradeExam(){
  submitted=true;let score=0;const missByCat={};
  exam.forEach(q=&gt;{
    const correct=q.ans,chosen=answers[q.num];
    if(chosen===correct)score++; else {const c=lessons.find(l=&gt;l.num===q.lesson).cat;missByCat[c]=(missByCat[c]||0)+1;}
    document.querySelectorAll(`.opt[data-q=&quot;${q.num}&quot;]`).forEach(o=&gt;{
      o.classList.remove(&#x27;selected&#x27;);
      if(o.dataset.l===correct)o.classList.add(&#x27;correct&#x27;);
      else if(o.dataset.l===chosen)o.classList.add(&#x27;wrong&#x27;);
    });
    document.getElementById(&#x27;sol-&#x27;+q.num).classList.add(&#x27;show&#x27;);
  });
  document.getElementById(&#x27;scNum&#x27;).textContent=score;
  const pct=score/30*100;
  const v=document.getElementById(&#x27;scVerdict&#x27;);
  if(pct&gt;=80){v.textContent=&#x27;Mission Ready&#x27;;v.className=&#x27;verdict pass&#x27;;}
  else{v.textContent=&#x27;Recommend Re-Drill&#x27;;v.className=&#x27;verdict review&#x27;;}
  const weak=Object.entries(missByCat).sort((a,b)=&gt;b[1]-a[1]).slice(0,3).map(e=&gt;e[0]);
  document.getElementById(&#x27;scWeak&#x27;).innerHTML = weak.length? &#x27;Weakest areas: &#x27;+weak.map(w=&gt;`&lt;b&gt;${w}&lt;/b&gt;`).join(&#x27; · &#x27;) : &#x27;Clean sweep — no missed concepts.&#x27;;
  document.getElementById(&#x27;scorecard&#x27;).classList.add(&#x27;show&#x27;);
  document.getElementById(&#x27;examSubmit&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;scorecard&#x27;).scrollIntoView({behavior:&#x27;smooth&#x27;,block:&#x27;center&#x27;});
}
function resetExam(){answers={};submitted=false;document.getElementById(&#x27;scorecard&#x27;).classList.remove(&#x27;show&#x27;);renderExam();window.scrollTo({top:document.querySelector(&#x27;.viewnav&#x27;).offsetTop,behavior:&#x27;smooth&#x27;});}
renderExam();

/* study plan */
const planData=[
  {d:&#x27;Day 1&#x27;,t:&#x27;Lessons 1–2&#x27;,k:&#x27;Percents · Rates&#x27;},
  {d:&#x27;Day 2&#x27;,t:&#x27;Lessons 3–4&#x27;,k:&#x27;Ratios · Fractions&#x27;},
  {d:&#x27;Day 3&#x27;,t:&#x27;Lessons 5–6&#x27;,k:&#x27;Probability · Factoring&#x27;},
  {d:&#x27;Day 4&#x27;,t:&#x27;Lessons 7–8&#x27;,k:&#x27;% Change · Work&#x27;},
  {d:&#x27;Day 5&#x27;,t:&#x27;Lessons 9–10&#x27;,k:&#x27;Wages · Shortcuts&#x27;},
  {d:&#x27;Day 6&#x27;,t:&#x27;Practice Test&#x27;,k:&#x27;All 30, no notes&#x27;,test:true},
  {d:&#x27;Day 7&#x27;,t:&#x27;Review Weak Areas&#x27;,k:&#x27;Re-drill misses&#x27;,test:true},
];
const pg=document.getElementById(&#x27;planGrid&#x27;);
planData.forEach(p=&gt;{const d=document.createElement(&#x27;div&#x27;);d.className=&#x27;day&#x27;+(p.test?&#x27; test&#x27;:&#x27;&#x27;);d.innerHTML=`&lt;div class=&quot;dl&quot;&gt;${p.d}&lt;/div&gt;&lt;div class=&quot;dt&quot;&gt;${p.t}&lt;/div&gt;&lt;div class=&quot;dl&quot; style=&quot;margin-top:6px;letter-spacing:.06em&quot;&gt;${p.k}&lt;/div&gt;`;pg.appendChild(d);});
&lt;/script&gt;

&lt;head&gt;
&lt;meta charset=&quot;UTF-8&quot;&gt;
&lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot;&gt;
&lt;title&gt;ASVAB Word Knowledge — Field Manual&lt;/title&gt;
&lt;link rel=&quot;preconnect&quot; href=&quot;https://fonts.googleapis.com&quot;&gt;
&lt;link rel=&quot;preconnect&quot; href=&quot;https://fonts.gstatic.com&quot; crossorigin&gt;
&lt;link href=&quot;https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&amp;family=Roboto+Condensed:wght@400;700&amp;family=Roboto+Mono:wght@400;500;700&amp;family=Roboto:wght@400;500;700&amp;display=swap&quot; rel=&quot;stylesheet&quot;&gt;
&lt;style&gt;
:root{
  --od:#3a3f2a;--od-deep:#23271a;--od-dark:#181b12;
  --sand:#d8cdb0;--sand-2:#c4b894;
  --amber:#e8a02a;--amber-soft:#f0c468;
  --rust:#a8431f;--green:#6f8f3a;
  --paper:#e9e2cd;--paper-2:#ded5bb;
  --ink:#22241a;--line:rgba(34,36,26,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:&#x27;Roboto&#x27;,sans-serif;background:var(--od-dark);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
::selection{background:var(--amber);color:var(--od-dark)}

.classbar{background:repeating-linear-gradient(45deg,var(--od-deep) 0 14px,#2b2f1f 14px 28px);color:var(--sand);font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;letter-spacing:.32em;font-weight:700;text-transform:uppercase;padding:7px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #000}
.classbar span{opacity:.85}
.seclink{background:var(--od-dark);display:flex;gap:0;border-bottom:1px solid rgba(216,205,176,.14)}
.seclink a{flex:1;text-align:center;text-decoration:none;padding:11px 8px;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sand-2);border-right:1px solid rgba(216,205,176,.14);transition:all .15s}
.seclink a:last-child{border-right:none}
.seclink a:hover{color:var(--paper);background:var(--od-deep)}
.seclink a.here{color:var(--amber);font-weight:700;box-shadow:inset 0 -3px 0 var(--amber)}

.hero{position:relative;background:linear-gradient(180deg,rgba(24,27,18,.72),rgba(24,27,18,.92)),radial-gradient(circle at 25% 20%,rgba(232,160,42,.14),transparent 46%),var(--od-deep);color:var(--sand);padding:50px 22px 56px;overflow:hidden;border-bottom:3px solid var(--amber)}
.hero::before{content:&quot;&quot;;position:absolute;inset:0;background-image:linear-gradient(rgba(216,205,176,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(216,205,176,.04) 1px,transparent 1px);background-size:38px 38px;pointer-events:none}
.hero-inner{max-width:1080px;margin:0 auto;position:relative}
.eyebrow{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.7rem;letter-spacing:.34em;color:var(--amber);text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.eyebrow::after{content:&quot;&quot;;height:1px;flex:1;min-width:30px;background:linear-gradient(90deg,var(--amber),transparent)}
.hero h1{font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;font-size:clamp(2.4rem,7.5vw,5rem);line-height:.92;text-transform:uppercase;letter-spacing:.01em;color:var(--paper);text-shadow:3px 3px 0 rgba(0,0,0,.35)}
.hero h1 .accent{display:block;color:var(--amber);font-size:clamp(1rem,3.2vw,1.9rem);letter-spacing:.16em;margin-top:8px;font-weight:600}
.hero p.lede{max-width:560px;margin:22px 0 0;font-size:1.06rem;color:var(--sand-2);font-family:&#x27;Roboto Condensed&#x27;,sans-serif}
.specrow{display:flex;gap:0;flex-wrap:wrap;margin-top:32px;border:1px solid rgba(216,205,176,.28);background:rgba(0,0,0,.22)}
.spec{flex:1;min-width:120px;padding:14px 18px;border-right:1px solid rgba(216,205,176,.2)}
.spec:last-child{border-right:none}
.spec .k{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.6rem;letter-spacing:.22em;color:var(--amber);text-transform:uppercase}
.spec .v{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:1.5rem;font-weight:600;color:var(--paper);margin-top:3px}
.spec .v small{font-size:.7rem;color:var(--sand-2);font-family:&#x27;Roboto Mono&#x27;,monospace;display:block;letter-spacing:.1em;font-weight:400}

.viewnav{position:sticky;top:0;z-index:40;background:var(--od-dark);border-bottom:1px solid rgba(216,205,176,.18);display:flex;overflow-x:auto}
.viewnav button{flex:0 0 auto;background:transparent;border:none;cursor:pointer;color:var(--sand-2);font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:500;font-size:.92rem;letter-spacing:.12em;text-transform:uppercase;padding:15px 20px;position:relative;white-space:nowrap;transition:color .15s}
.viewnav button:hover{color:var(--paper)}
.viewnav button.active{color:var(--amber)}
.viewnav button.active::after{content:&quot;&quot;;position:absolute;left:12px;right:12px;bottom:0;height:3px;background:var(--amber)}
.viewnav .count{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;opacity:.6;margin-left:6px}

.wrap{max-width:1080px;margin:0 auto;padding:38px 22px 80px}
.view{display:none}
.view.active{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sechead{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.sechead h2{font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;text-transform:uppercase;font-size:1.7rem;letter-spacing:.04em;color:var(--paper)}
.sechead .tag{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;letter-spacing:.2em;color:var(--amber);text-transform:uppercase}
.secsub{color:var(--sand-2);font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1rem;margin-bottom:26px;max-width:660px}

/* search + filters */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;background:var(--paper);border:1px solid var(--line);padding:10px 12px 10px 34px;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.98rem;color:var(--ink);border-radius:1px}
.search input:focus{outline:2px solid var(--amber);outline-offset:-1px}
.search::before{content:&quot;\u2315&quot;;position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#7a755e;font-size:1.1rem}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.chip{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;padding:7px 12px;border:1px solid rgba(216,205,176,.3);background:transparent;color:var(--sand-2);cursor:pointer;transition:all .15s;border-radius:1px}
.chip:hover{border-color:var(--amber);color:var(--paper)}
.chip.active{background:var(--amber);color:var(--od-dark);border-color:var(--amber);font-weight:700}

/* vocab roster */
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:13px}
.card{background:var(--paper);border:1px solid var(--line);border-left:5px solid var(--cat,#888);padding:15px 16px;cursor:pointer;position:relative;transition:transform .12s,box-shadow .12s;display:flex;flex-direction:column;min-height:118px}
.card:hover{transform:translateY(-3px);box-shadow:6px 8px 0 rgba(0,0,0,.32)}
.card .cardtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card .lnum{font-family:&#x27;Roboto Mono&#x27;,monospace;font-weight:700;font-size:.64rem;letter-spacing:.12em;color:#6a6750}
.card .catpill{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.5rem;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;color:#fff;background:var(--cat,#888);font-weight:700;border-radius:1px}
.card h3{font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:600;font-size:1.4rem;line-height:1;color:var(--ink);margin-bottom:7px;text-transform:uppercase;letter-spacing:.01em}
.card .syn{margin-top:auto;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.92rem;color:#55523f}
.card .syn b{color:var(--green);font-weight:700}
.card .go{position:absolute;right:13px;bottom:11px;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.64rem;color:var(--cat,#888);opacity:0;transition:opacity .15s;letter-spacing:.1em}
.card:hover .go{opacity:1}
.noresult{color:var(--sand-2);font-family:&#x27;Roboto Condensed&#x27;,sans-serif;padding:20px 0}

/* dossier */
.scrim{position:fixed;inset:0;background:rgba(10,12,7,.82);z-index:90;display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto;backdrop-filter:blur(3px)}
.scrim.open{display:flex}
.dossier{background:var(--paper);max-width:680px;width:100%;margin:auto;position:relative;border:1px solid #000;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:pop .3s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(14px)}to{opacity:1;transform:none}}
.dossier-band{background:var(--od-deep);color:var(--sand);padding:14px 22px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--amber)}
.dossier-band .dnum{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.2em;color:var(--amber)}
.dossier-band .dcat{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;background:var(--cat,#888);color:#fff;font-weight:700}
.closeb{position:absolute;top:9px;right:12px;background:none;border:none;color:var(--sand);font-size:1.5rem;cursor:pointer;line-height:1;z-index:5;width:34px;height:34px}
.closeb:hover{color:var(--amber)}
.dossier-body{padding:24px 26px 30px}
.wordhead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:4px}
.wordhead h2{font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;text-transform:uppercase;font-size:2.4rem;line-height:1;color:var(--ink);letter-spacing:.01em}
.wordhead .eq{font-family:&#x27;Roboto Mono&#x27;,monospace;color:#7a755e;font-size:.9rem}
.wordhead .eq b{color:var(--green)}
.defline{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1.08rem;color:#33352a;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.block{margin-bottom:18px}
.block .bh{font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:.88rem;color:var(--od);display:flex;align-items:center;gap:9px;margin-bottom:7px}
.block .bh::before{content:&quot;&quot;;width:18px;height:2px;background:var(--amber)}
.block p{font-size:.98rem;color:#33352a;font-family:&#x27;Roboto Condensed&#x27;,sans-serif}
.trick{background:linear-gradient(180deg,#fbe9c4,#f5dca0);border:1px solid #d9b35e;border-left:5px solid var(--amber);padding:13px 16px;font-family:&#x27;Roboto Condensed&#x27;,sans-serif}
.trick .mlbl{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.54rem;letter-spacing:.18em;color:#8a6a1c;text-transform:uppercase;margin-bottom:4px;font-weight:700}
.trick .mtxt{font-size:1.08rem;font-weight:700;color:#5e4710}
.exq{background:#fff;border:1px solid var(--line);border-left:3px solid var(--od);padding:11px 14px;font-style:italic;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;color:var(--ink);font-size:1rem}
.trap{background:#f1ddd2;border:1px solid #d6a98e;border-left:5px solid var(--rust);padding:12px 15px;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.95rem;color:#5c2e1c}
.trap .tl{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.54rem;letter-spacing:.18em;color:#8a3a1c;text-transform:uppercase;margin-bottom:4px;font-weight:700}
.dossier-nav{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding:14px 26px;background:var(--paper-2)}
.dossier-nav button{background:none;border:1px solid var(--od);color:var(--od);cursor:pointer;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;transition:all .15s}
.dossier-nav button:hover:not(:disabled){background:var(--od);color:var(--sand)}
.dossier-nav button:disabled{opacity:.3;cursor:default}

/* flashcards */
.flash-stage{max-width:540px;margin:0 auto}
.flash-progress{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.7rem;letter-spacing:.18em;color:var(--sand-2);text-align:center;margin-bottom:14px}
.flash-progress b{color:var(--amber)}
.flashcard{perspective:1600px;height:330px;cursor:pointer;margin-bottom:20px}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.flashcard.flipped .flash-inner{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center;border:1px solid #000}
.flash-front{background:var(--paper);border-left:6px solid var(--cat,#888)}
.flash-front .fcat{position:absolute;top:14px;left:18px;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--cat,#888);padding:3px 9px;font-weight:700}
.flash-front .fnum{position:absolute;top:14px;right:18px;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;color:#7a755e;letter-spacing:.1em}
.flash-front .fw{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:2.8rem;font-weight:700;text-transform:uppercase;color:var(--ink);line-height:1}
.flash-front .ftap{position:absolute;bottom:16px;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.56rem;letter-spacing:.18em;color:#9a937a;text-transform:uppercase}
.flash-back{background:var(--od-deep);color:var(--sand);transform:rotateY(180deg);border-left:6px solid var(--amber)}
.flash-back .balbl{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.56rem;letter-spacing:.2em;color:var(--amber);text-transform:uppercase;margin-bottom:6px}
.flash-back .baval{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:2.1rem;font-weight:700;color:var(--paper);text-transform:uppercase;line-height:1.05;margin-bottom:14px}
.flash-back .bmean{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.98rem;color:var(--sand-2);margin-bottom:12px;max-width:92%}
.flash-back .bmem{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1rem;color:var(--amber-soft);border-top:1px solid rgba(216,205,176,.25);padding-top:12px;max-width:92%}
.flash-controls{display:flex;gap:10px;justify-content:center}
.flash-controls button{background:var(--od);color:var(--sand);border:none;cursor:pointer;font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:500;letter-spacing:.1em;text-transform:uppercase;font-size:.82rem;padding:11px 20px;transition:background .15s}
.flash-controls button:hover:not(:disabled){background:var(--amber);color:var(--od-dark)}
.flash-controls button:disabled{opacity:.3;cursor:default}

/* exam */
.exam-meta{display:flex;gap:0;flex-wrap:wrap;margin-bottom:22px;border:1px solid var(--line);background:var(--paper)}
.exam-meta .m{flex:1;min-width:110px;padding:12px 16px;border-right:1px solid var(--line)}
.exam-meta .m:last-child{border-right:none}
.exam-meta .mk{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:#7a755e}
.exam-meta .mv{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:1.2rem;font-weight:600;color:var(--ink);margin-top:2px}
.qcard{background:var(--paper);border:1px solid var(--line);padding:18px 20px;margin-bottom:14px}
.qcard .qhead{display:flex;gap:10px;margin-bottom:13px}
.qcard .qn{font-family:&#x27;Roboto Mono&#x27;,monospace;font-weight:700;color:var(--amber);background:var(--od-deep);padding:2px 9px;font-size:.78rem;height:fit-content;letter-spacing:.05em}
.qcard .qtext{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1.05rem;color:var(--ink);font-weight:700;flex:1}
.qcard .qtext u{text-decoration-color:var(--amber);text-underline-offset:3px}
.opts{display:grid;gap:8px}
.opt{display:flex;align-items:center;gap:11px;padding:10px 14px;border:1px solid var(--line);background:#fff;cursor:pointer;transition:all .12s;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.98rem}
.opt:hover{border-color:var(--od);background:#fbf8ef}
.opt .ol{font-family:&#x27;Roboto Mono&#x27;,monospace;font-weight:700;font-size:.78rem;color:var(--od);width:18px;flex:0 0 auto}
.opt.selected{border-color:var(--od);background:#efe9d6;box-shadow:inset 3px 0 0 var(--od)}
.opt.correct{border-color:var(--green);background:#e7eed3;box-shadow:inset 3px 0 0 var(--green)}
.opt.wrong{border-color:var(--rust);background:#f1ddd2;box-shadow:inset 3px 0 0 var(--rust)}
.opt.correct .ol{color:var(--green)}
.opt.wrong .ol{color:var(--rust)}
.qsol{display:none;margin-top:12px;background:var(--od-deep);color:var(--sand);padding:13px 16px;font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.97rem;border-left:4px solid var(--amber)}
.qsol.show{display:block;animation:fade .3s}
.qsol .sl{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.54rem;letter-spacing:.18em;color:var(--amber);text-transform:uppercase;margin-bottom:5px;font-weight:700;display:flex;justify-content:space-between}
.qsol .sl a{color:var(--amber-soft);text-decoration:underline;cursor:pointer;letter-spacing:.04em}
.qsol .trick-in{color:var(--amber-soft);font-style:italic}
.exam-submit{background:var(--green);color:#fff;border:none;cursor:pointer;font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:.92rem;padding:14px 30px;margin-top:8px;width:100%}
.exam-submit:hover{background:#5e7a31}
.exam-submit:disabled{opacity:.4;cursor:default}
.scorecard{background:var(--od-deep);color:var(--sand);border:3px solid var(--amber);padding:28px 24px;text-align:center;margin-bottom:26px;display:none}
.scorecard.show{display:block;animation:fade .4s}
.scorecard .stamp{font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.62rem;letter-spacing:.26em;color:var(--amber);text-transform:uppercase}
.scorecard .big{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:4.2rem;font-weight:700;color:var(--paper);line-height:1}
.scorecard .big small{font-size:1.4rem;color:var(--sand-2)}
.scorecard .verdict{font-family:&#x27;Oswald&#x27;,sans-serif;font-size:1.3rem;text-transform:uppercase;letter-spacing:.1em;margin-top:6px}
.scorecard .verdict.pass{color:var(--green)}
.scorecard .verdict.review{color:var(--amber)}
.scorecard .weak{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.95rem;color:var(--sand-2);margin-top:12px}
.scorecard .weak b{color:var(--amber-soft)}
.scorecard .retake{background:none;border:1px solid var(--sand);color:var(--sand);cursor:pointer;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;padding:9px 18px;margin-top:16px}
.scorecard .retake:hover{background:var(--sand);color:var(--od-deep)}

/* strategy */
.strat{display:grid;gap:12px;margin-bottom:28px}
.strat .s{background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--amber);padding:15px 18px;display:flex;gap:14px;align-items:flex-start}
.strat .s .sn{font-family:&#x27;Oswald&#x27;,sans-serif;font-weight:700;font-size:1.5rem;color:var(--amber);line-height:1;flex:0 0 auto;width:30px}
.strat .s p{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:1rem;color:#33352a}
.fam{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.famcard{background:var(--od-deep);color:var(--sand);padding:12px 14px;border-left:3px solid var(--green)}
.famcard .fw{font-family:&#x27;Oswald&#x27;,sans-serif;text-transform:uppercase;font-size:1.05rem;color:var(--paper)}
.famcard .fs{font-family:&#x27;Roboto Condensed&#x27;,sans-serif;font-size:.9rem;color:var(--amber-soft)}

.foot{background:var(--od-dark);color:var(--sand-2);border-top:1px solid rgba(216,205,176,.15);padding:26px 22px;text-align:center;font-family:&#x27;Roboto Mono&#x27;,monospace;font-size:.66rem;letter-spacing:.12em}
.foot b{color:var(--amber)}
@media(max-width:600px){
  .hero{padding:38px 18px 44px}
  .spec{min-width:50%;border-bottom:1px solid rgba(216,205,176,.2)}
  .spec:nth-child(odd){border-right:1px solid rgba(216,205,176,.2)}
  .spec:nth-child(even){border-right:none}
  .dossier-body{padding:20px 18px 24px}
  .flashcard{height:290px}
}
&lt;/style&gt;

const DATA = {&quot;words&quot;: [{&quot;num&quot;: 1, &quot;word&quot;: &quot;Noble&quot;, &quot;fmt&quot;: &quot;define&quot;, &quot;prompt&quot;: &quot;Noble most nearly means&quot;, &quot;choices&quot;: [&quot;comely&quot;, &quot;loose&quot;, &quot;aristocratic&quot;, &quot;lackadaisical&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;answer&quot;: &quot;aristocratic&quot;, &quot;meaning&quot;: &quot;high-ranking, honorable, of a noble family&quot;, &quot;trick&quot;: &quot;Noble = nobleman = aristocrat&quot;, &quot;example&quot;: &quot;The noble family lived in the castle.&quot;, &quot;whywrong&quot;: &quot;comely = attractive; loose = not tight; lackadaisical = careless.&quot;, &quot;cat&quot;: &quot;People &amp; Society&quot;}, {&quot;num&quot;: 2, &quot;word&quot;: &quot;Concede&quot;, &quot;fmt&quot;: &quot;sentence&quot;, &quot;prompt&quot;: &quot;John initially disagreed with Megan, but then he had to ___ her point about the budget.&quot;, &quot;choices&quot;: [&quot;argue&quot;, &quot;understand&quot;, &quot;counter&quot;, &quot;admit&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;answer&quot;: &quot;admit&quot;, &quot;meaning&quot;: &quot;to accept something is true, especially after first disagreeing&quot;, &quot;trick&quot;: &quot;Concede = “I give in; you are right.”&quot;, &quot;example&quot;: &quot;He had to concede that Megan made a good point.&quot;, &quot;whywrong&quot;: &quot;argue/counter mean disagree; understand is know, not admit.&quot;, &quot;cat&quot;: &quot;Actions &amp; Verbs&quot;}, {&quot;num&quot;: 3, &quot;word&quot;: &quot;Goad&quot;, &quot;fmt&quot;: &quot;define&quot;, &quot;prompt&quot;: &quot;Goad most nearly means&quot;, &quot;choices&quot;: [&quot;listen&quot;, &quot;provoke&quot;, &quot;pacify&quot;, &quot;ignore&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;answer&quot;: &quot;provoke&quot;, &quot;meaning&quot;: &quot;to push, urge, or irritate someone into action&quot;, &quot;trick&quot;: &quot;A goad is like a poke that pushes someone&quot;, &quot;example&quot;: &quot;His comments goaded the crowd into reacting.&quot;, &quot;whywrong&quot;: &quot;listen/ignore are opposite ideas; pacify means calm down.&quot;, &quot;cat&quot;: &quot;Actions &amp; Verbs&quot;}, {&quot;num&quot;: 4, &quot;word&quot;: &quot;Herd&quot;, &quot;fmt&quot;: &quot;sentence&quot;, &quot;prompt&quot;: &quot;Teenagers at the mall love to roam in a ___.&quot;, &quot;choices&quot;: [&quot;jacket&quot;, &quot;line&quot;, &quot;pack&quot;, &quot;ratio&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;answer&quot;: &quot;pack&quot;, &quot;meaning&quot;: &quot;a group of animals or people moving together&quot;, &quot;trick&quot;: &quot;Herd = group; pack = group&quot;, &quot;example&quot;: &quot;Teenagers moved through the mall in a herd.&quot;, &quot;whywrong&quot;: &quot;jacket, line, ratio do not mean a group in this context.&quot;, &quot;cat&quot;: &quot;People &amp; Society&quot;}, {&quot;num&quot;: 5, &quot;word&quot;: &quot;Viable&quot;, &quot;fmt&quot;: &quot;sentence&quot;, &quot;prompt&quot;: &quot;Panicking in an emergency is not a ___ response for an EMT.&quot;, &quot;choices&quot;: [&quot;total&quot;, &quot;collective&quot;, &quot;lucid&quot;, &quot;workable&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;answer&quot;: &quot;workable&quot;, &quot;meaning&quot;: &quot;able to succeed or be used&quot;, &quot;trick&quot;: &quot;Viable = it can work&quot;, &quot;example&quot;: &quot;Panicking is not a viable response in an emergency.&quot;, &quot;whywrong&quot;: &quot;total, collective, lucid do not mean practical/workable.&quot;, &quot;cat&quot;: &quot;Qualities &amp; Descriptions&quot;}, {&quot;num&quot;: 6, &quot;word&quot;: &quot;Judicious&quot;, &quot;fmt&quot;: &quot;define&quot;, &quot;prompt&quot;: &quot;Judicious most nearly means&quot;, &quot;choices&quot;: [&quot;accessible&quot;, &quot;cold&quot;, &quot;wise&quot;, &quot;talkative&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;answer&quot;: &quot;wise&quot;, &quot;meaning&quot;: &quot;showing good judgment&quot;, &quot;trick&quot;: &quot;Judicious = judge wisely&quot;, &quot;example&quot;: &quot;A judicious leader makes careful decisions.&quot;, &quot;whywrong&quot;: &quot;accessible = easy to reach; cold/talkative do not match.&quot;, &quot;cat&quot;: &quot;Qualities &amp; Descriptions&quot;}, {&quot;num&quot;: 7, &quot;word&quot;: &quot;Hesitating&quot;, &quot;fmt&quot;: &quot;sentence&quot;, &quot;prompt&quot;: &quot;___ in a time of crisis can often lead to failure.&quot;, &quot;choices&quot;: [&quot;broadening&quot;, &quot;creating&quot;, &quot;leaving&quot;, &quot;pausing&quot;], &quot;ans&quot;: &quot;D&quot;, &quot;answer&quot;: &quot;pausing&quot;, &quot;meaning&quot;: &quot;stopping briefly before acting&quot;, &quot;trick&quot;: &quot;Hesitating = hitting pause&quot;, &quot;example&quot;: &quot;Hesitating in a crisis can lead to failure.&quot;, &quot;whywrong&quot;: &quot;broadening/creating/leaving are different actions.&quot;, &quot;cat&quot;: &quot;Actions &amp; Verbs&quot;}, {&quot;num&quot;: 8, &quot;word&quot;: &quot;Falsifying&quot;, &quot;fmt&quot;: &quot;sentence&quot;, &quot;prompt&quot;: &quot;Applicants who insist on ___ information ruin the process for everyone.&quot;, &quot;choices&quot;: [&quot;fabricating&quot;, &quot;listing&quot;, &quot;furthering&quot;, &quot;taking on&quot;], &quot;ans&quot;: &quot;A&quot;, &quot;answer&quot;: &quot;fabricating&quot;, &quot;meaning&quot;: &quot;making false information; lying in documents&quot;, &quot;trick&quot;: &quot;False = not true; fabricate = make up&quot;, &quot;example&quot;: &quot;Falsifying an application can ruin the process.&quot;, &quot;whywrong&quot;: &quot;listing/furthering/taking on do not mean making false info.&quot;, &quot;cat&quot;: &quot;Actions &amp; Verbs&quot;}, {&quot;num&quot;: 9, &quot;word&quot;: &quot;Hollow&quot;, &quot;fmt&quot;: &quot;define&quot;, &quot;prompt&quot;: &quot;Hollow most nearly means&quot;, &quot;choices&quot;: [&quot;dangerous&quot;, &quot;potent&quot;, &quot;empty&quot;, &quot;superb&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;answer&quot;: &quot;empty&quot;, &quot;meaning&quot;: &quot;having space inside; not filled&quot;, &quot;trick&quot;: &quot;Hollow log = empty inside&quot;, &quot;example&quot;: &quot;The hollow tree had animals inside.&quot;, &quot;whywrong&quot;: &quot;dangerous/potent/superb do not mean empty.&quot;, &quot;cat&quot;: &quot;Qualities &amp; Descriptions&quot;}, {&quot;num&quot;: 10, &quot;word&quot;: &quot;Coax&quot;, &quot;fmt&quot;: &quot;define&quot;, &quot;prompt&quot;: &quot;Coax most nearly means&quot;, &quot;choices&quot;: [&quot;advise&quot;, &quot;trade&quot;, &quot;plead&quot;, &quot;grace&quot;], &quot;ans&quot;: &quot;C&quot;, &quot;answer&quot;: &quot;plead&quot;, &quot;meaning&quot;: &quot;to gently persuade or beg someone to do something&quot;, &quot;trick&quot;: &quot;Coax = convince with soft pressure&quot;, &quot;example&quot;: &quot;She tried to coax the child into eating.&quot;, &quot;whywrong&quot;: &quot;advise is give counsel; trade and grace do not fit.&quot;, &quot;cat&quot;: &quot;Actions &amp; Verbs&quot;}, {&quot;num&quot;: 11, &quot;word&quot;: &quot;Monotonous&quot;, &quot;fmt&quot;: &quot;sentence&quot;, &quot;prompt&quot;: &quot;The ___ speech left them all feeling sleepy.&quot;, &quot;choices&quot;: [&quot;telling&quot;, &quot;boring&quot;, &quot;caustic&quot;, &quot;hilarious&quot;], &quot;ans&quot;: &quot;B&quot;, &quot;answer&quot;: &quot;boring&quot;, &quot;meaning&quot;: &quot;dull, repetitive, lacking variety&quot;, &quot;trick&quot;: &quot;Mono = one; one tone = boring&quot;, &quot;example&quot;: &quot;The monotonous speech made everyone sleepy.&quot;, &quot;whywrong&quot;: &quot;telling/caustic/hilarious do not mean dull.&quot;, &quot;cat&quot;: &quot;Qualities &amp; Descriptions&quot;}, {&quot;num&quot;: 12, &quot;word&quot;: &quot;Consternation&quot;, &quot;fmt&quot;: &quot;sentence&quot;, &quot;   b.textContent=c===&#x27;All&#x27;?&#x27;All Words&#x27;:c;
  b.onclick=()=&gt;{activeFilter=c;document.querySelectorAll(&#x27;.chip&#x27;).forEach(x=&gt;x.classList.remove(&#x27;active&#x27;));b.classList.add(&#x27;active&#x27;);renderRoster();};

function renderRoster(){
  const q=(document.getElementById(&#x27;searchBox&#x27;).value||&#x27;&#x27;).toLowerCase().trim();
  const r=document.getElementById(&#x27;roster&#x27;);r.innerHTML=&#x27;&#x27;;
  const list=words.filter(w=&gt;(activeFilter===&#x27;All&#x27;||w.cat===activeFilter) &amp;&amp;
    (!q || w.word.toLowerCase().includes(q) || w.answer.toLowerCase().includes(q) || w.meaning.toLowerCase().includes(q)));
  if(!list.length){r.innerHTML=&#x27;&lt;div class=&quot;noresult&quot;&gt;No words match that search.&lt;/div&gt;&#x27;;return;}
  list.forEach(w=&gt;{
    const col=CATCOLOR[w.cat]||&#x27;#888&#x27;;

let curW=0;
function openDossier(num){curW=words.findIndex(w=&gt;w.num===num);paintDossier();document.getElementById(&#x27;scrim&#x27;).classList.add(&#x27;open&#x27;);document.body.style.overflow=&#x27;hidden&#x27;;}
function paintDossier(){
  const w=words[curW];const col=CATCOLOR[w.cat]||&#x27;#888&#x27;;
  document.getElementById(&#x27;dossier&#x27;).style.setProperty(&#x27;--cat&#x27;,col);
  document.getElementById(&#x27;dNum&#x27;).textContent=&#x27;WORD &#x27;+String(w.num).padStart(2,&#x27;0&#x27;)+&#x27; / 35&#x27;;
  document.getElementById(&#x27;dCat&#x27;).textContent=w.cat;document.getElementById(&#x27;dCat&#x27;).style.background=col;
  document.getElementById(&#x27;dBody&#x27;).innerHTML=`
    &lt;div class=&quot;wordhead&quot;&gt;&lt;h2&gt;${w.word}&lt;/h2&gt;&lt;span class=&quot;eq&quot;&gt;most nearly means &lt;b&gt;${w.answer}&lt;/b&gt;&lt;/span&gt;&lt;/div&gt;
    &lt;div class=&quot;defline&quot;&gt;${w.meaning}&lt;/div&gt;
    &lt;div class=&quot;block trick&quot;&gt;&lt;div class=&quot;mlbl&quot;&gt;Memory Trick&lt;/div&gt;&lt;div class=&quot;mtxt&quot;&gt;${w.trick}&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;block&quot;&gt;&lt;div class=&quot;bh&quot;&gt;In a Sentence&lt;/div&gt;&lt;div class=&quot;exq&quot;&gt;${w.example}&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;block trap&quot;&gt;&lt;div class=&quot;tl&quot;&gt;Why the Traps Fail&lt;/div&gt;${w.whywrong}&lt;/div&gt;`;
  document.getElementById(&#x27;dPrev&#x27;).disabled=curW===0;

}
function dossierNav(d){curW=Math.max(0,Math.min(words.length-1,curW+d));paintDossier();}
function closeDossier(){document.getElementById(&#x27;scrim&#x27;).classList.remove(&#x27;open&#x27;);document.body.style.overflow=&#x27;&#x27;;}
document.addEventListener(&#x27;keydown&#x27;,e=&gt;{
  if(!document.getElementById(&#x27;scrim&#x27;).classList.contains(&#x27;open&#x27;))return;
  if(e.key===&#x27;Escape&#x27;)closeDossier();
  if(e.key===&#x27;ArrowRight&#x27;&amp;&amp;curW&lt;words.length-1)dossierNav(1);
  if(e.key===&#x27;ArrowLeft&#x27;&amp;&amp;curW&gt;0)dossierNav(-1);
});

/* flashcards */
let deck=words.map((_,i)=&gt;i),fPos=0;
document.getElementById(&#x27;fTot&#x27;).textContent=words.length;
function paintFlash(){
  const w=words[deck[fPos]];const col=CATCOLOR[w.cat]||&#x27;#888&#x27;;
  document.getElementById(&#x27;flashcard&#x27;).classList.remove(&#x27;flipped&#x27;);
  document.getElementById(&#x27;flashcard&#x27;).style.setProperty(&#x27;--cat&#x27;,col);
  document.getElementById(&#x27;fIdx&#x27;).textContent=fPos+1;
  document.getElementById(&#x27;fCat&#x27;).textContent=w.cat.toUpperCase();
  document.getElementById(&#x27;ffCat&#x27;).textContent=w.cat;document.getElementById(&#x27;ffCat&#x27;).style.background=col;
  document.getElementById(&#x27;ffNum&#x27;).textContent=&#x27;WORD &#x27;+String(w.num).padStart(2,&#x27;0&#x27;);
  document.getElementById(&#x27;ffW&#x27;).textContent=w.word;
  document.getElementById(&#x27;fbA&#x27;).textContent=w.answer;
  document.getElementById(&#x27;fbMean&#x27;).textContent=w.meaning;
  document.getElementById(&#x27;fbMem&#x27;).textContent=w.trick;
  document.getElementById(&#x27;fPrev&#x27;).disabled=fPos===0;
  document.getElementById(&#x27;fNext&#x27;).disabled=fPos===deck.length-1;
}
function flipCard(){document.getElementById(&#x27;flashcard&#x27;).classList.toggle(&#x27;flipped&#x27;);}
function flashNav(d){fPos=Math.max(0,Math.min(deck.length-1,fPos+d));paintFlash();}
function shuffleDeck(){for(let i=deck.length-1;i&gt;0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}fPos=0;paintFlash();}
paintFlash();

/* exam */
let answers={},submitted=false;
function fmtPrompt(w){
  if(w.fmt===&#x27;define&#x27;){return `&lt;u&gt;${w.word}&lt;/u&gt; most nearly means`;}
  return w.prompt.replace(&#x27;___&#x27;, `&lt;u&gt;____&lt;/u&gt;`);
}
function renderExam(){
  const b=document.getElementById(&#x27;examBody&#x27;);b.innerHTML=&#x27;&#x27;;
  const letters=[&#x27;A&#x27;,&#x27;B&#x27;,&#x27;C&#x27;,&#x27;D&#x27;];
  words.forEach(w=&gt;{
    const card=document.createElement(&#x27;div&#x27;);card.className=&#x27;qcard&#x27;;card.id=&#x27;q-&#x27;+w.num;
    card.innerHTML=`&lt;div class=&quot;qhead&quot;&gt;&lt;span class=&quot;qn&quot;&gt;${String(w.num).padStart(2,&#x27;0&#x27;)}&lt;/span&gt;&lt;span class=&quot;qtext&quot;&gt;${fmtPrompt(w)}&lt;/span&gt;&lt;/div&gt;`;
    const opts=document.createElement(&#x27;div&#x27;);opts.className=&#x27;opts&#x27;;
    w.choices.forEach((ch,i)=&gt;{
      const o=document.createElement(&#x27;div&#x27;);o.className=&#x27;opt&#x27;;o.dataset.q=w.num;o.dataset.l=letters[i];
      o.innerHTML=`&lt;span class=&quot;ol&quot;&gt;${letters[i]}&lt;/span&gt;&lt;span&gt;${ch}&lt;/span&gt;`;
      o.onclick=()=&gt;{if(submitted)return;answers[w.num]=letters[i];opts.querySelectorAll(&#x27;.opt&#x27;).forEach(x=&gt;x.classList.remove(&#x27;selected&#x27;));o.classList.add(&#x27;selected&#x27;);updateSubmit();};
      opts.appendChild(o);
    });
    card.appendChild(opts);
    const sol=document.createElement(&#x27;div&#x27;);sol.className=&#x27;qsol&#x27;;sol.id=&#x27;sol-&#x27;+w.num;
    sol.innerHTML=`&lt;div class=&quot;sl&quot;&gt;&lt;span&gt;Answer · ${w.ans}&lt;/span&gt;&lt;a onclick=&quot;closeAndOpen(${w.num})&quot;&gt;▸ Open word card&lt;/a&gt;&lt;/div&gt;
      &lt;b&gt;${w.word}&lt;/b&gt; = ${w.answer}. ${w.meaning}. &lt;span class=&quot;trick-in&quot;&gt;Trick: ${w.trick}&lt;/span&gt;`;
    card.appendChild(sol);
    b.appendChild(card);
  });
  const sb=document.createElement(&#x27;button&#x27;);sb.className=&#x27;exam-submit&#x27;;sb.id=&#x27;examSubmit&#x27;;sb.textContent=&#x27;Submit Exam · 0 / 35 Answered&#x27;;sb.disabled=true;sb.onclick=gradeExam;
  b.appendChild(sb);
}
function closeAndOpen(num){switchView(&#x27;vocab&#x27;);setTimeout(()=&gt;openDossier(num),120);}
function updateSubmit(){const n=Object.keys(answers).length;const sb=document.getElementById(&#x27;examSubmit&#x27;);sb.textContent=`Submit Exam · ${n} / 35 Answered`;sb.disabled=n&lt;35;}
function gradeExam(){
  submitted=true;let score=0;const missByCat={};
  words.forEach(w=&gt;{
    const correct=w.ans,chosen=answers[w.num];
    if(chosen===correct)score++; else missByCat[w.cat]=(missByCat[w.cat]||0)+1;
    document.querySelectorAll(`.opt[data-q=&quot;${w.num}&quot;]`).forEach(o=&gt;{
      o.classList.remove(&#x27;selected&#x27;);
      if(o.dataset.l===correct)o.classList.add(&#x27;correct&#x27;);
      else if(o.dataset.l===chosen)o.classList.add(&#x27;wrong&#x27;);
    });
    document.getElementById(&#x27;sol-&#x27;+w.num).classList.add(&#x27;show&#x27;);
  });
  document.getElementById(&#x27;scNum&#x27;).textContent=score;
  const pct=score/35*100;
  const v=document.getElementById(&#x27;scVerdict&#x27;);
  if(pct&gt;=80){v.textContent=&#x27;Mission Ready&#x27;;v.className=&#x27;verdict pass&#x27;;}
  else{v.textContent=&#x27;Recommend Re-Drill&#x27;;v.className=&#x27;verdict review&#x27;;}
  const weak=Object.entries(missByCat).sort((a,b)=&gt;b[1]-a[1]).slice(0,3).map(e=&gt;e[0]);
  document.getElementById(&#x27;scWeak&#x27;).innerHTML = weak.length? &#x27;Weakest groups: &#x27;+weak.map(x=&gt;`&lt;b&gt;${x}&lt;/b&gt;`).join(&#x27; · &#x27;) : &#x27;Clean sweep — every word correct.&#x27;;
  document.getElementById(&#x27;scorecard&#x27;).classList.add(&#x27;show&#x27;);
  document.getElementById(&#x27;examSubmit&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;scorecard&#x27;).scrollIntoView({behavior:&#x27;smooth&#x27;,block:&#x27;center&#x27;});
}
function resetExam(){answers={};submitted=false;document.getElementById(&#x27;scorecard&#x27;).classList.remove(&#x27;show&#x27;);renderExam();window.scrollTo({top:document.querySelector(&#x27;.viewnav&#x27;).offsetTop,behavior:&#x27;smooth&#x27;});}
renderExam();

/* strategy */
const sl=document.getElementById(&#x27;stratList&#x27;);
strategy.forEach((s,i)=&gt;{const d=document.createElement(&#x27;div&#x27;);d.className=&#x27;s&#x27;;d.innerHTML=`&lt;span class=&quot;sn&quot;&gt;${i+1}&lt;/span&gt;&lt;p&gt;${s}&lt;/p&gt;`;sl.appendChild(d);});
const families=[[&#x27;precise&#x27;,&#x27;exact&#x27;],[&#x27;accrue&#x27;,&#x27;accumulate&#x27;],[&#x27;augment&#x27;,&#x27;enhance&#x27;],[&#x27;terminal&#x27;,&#x27;final&#x27;],[&#x27;portend&#x27;,&#x27;predict&#x27;],[&#x27;tactile&#x27;,&#x27;tangible&#x27;],[&#x27;renown&#x27;,&#x27;fame&#x27;],[&#x27;collusion&#x27;,&#x27;secret deal&#x27;],[&#x27;congeal&#x27;,&#x27;harden&#x27;],[&#x27;reconnoiter&#x27;,&#x27;scout&#x27;],[&#x27;innate&#x27;,&#x27;inborn&#x27;],[&#x27;mutate&#x27;,&#x27;change&#x27;]];
const fg=document.getElementById(&#x27;famGrid&#x27;);
families.forEach(([a,b])=&gt;{const d=document.createElement(&#x27;div&#x27;);d.className=&#x27;famcard&#x27;;d.innerHTML=`&lt;div class=&quot;fw&quot;&gt;${a}&lt;/div&gt;&lt;div class=&quot;fs&quot;&gt;= ${b}&lt;/div&gt;`;fg.appendChild(d);});
&lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;"></iframe></main>
</div>
<script>
const tabs = document.querySelectorAll('.top-tab');
const frames = document.querySelectorAll('.page-frame');
tabs.forEach(tab => tab.addEventListener('click', () => {
  tabs.forEach(t => t.classList.remove('active'));
  frames.forEach(f => f.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById(tab.dataset.target).classList.add('active');
}));
</script>
